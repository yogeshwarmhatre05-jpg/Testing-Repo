<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Pixel Glow Club</title>  
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">  
<style>  *{
box-sizing:border-box;
}

html,
body{
margin:0;
padding:0;
background:#0F172A;
color:#E2E8F0;
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
transition:background 1s ease;
}

body{
position:relative;
}

.rgbBorder{
position:fixed;
inset:0;
padding:3px;
background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0F172A;
}

@keyframes rgbMove{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

@keyframes discoRGB{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.mainBox{
width:300px;
margin:auto;
padding:14px;
text-align:center;
border:2px solid #1E293B;
border-radius:12px;
background:#0F172A;
transition:background 1s ease,border-color 1s ease,box-shadow 1s ease;
}

.themeText{
color:#22C55E;
transition:color 1s ease,text-shadow 1s ease;
}

.line{
height:1px;
background:rgba(255,255,255,0.15);
margin:8px 20px;
}

.pixelGlowBox{
width:270px;
height:60px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

.pixelBorder{
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(90deg,#22C55E,white,#22C55E);
background-size:300% 300%;
animation:discoRGB 6s ease-in-out infinite;
}

.pixelBorder::before{
content:"";
position:absolute;
inset:2px;
background:#0F172A;
}

#pixelText{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:1rem;
font-family:'Montserrat',sans-serif;
font-weight:700;
letter-spacing:2px;
color:#22C55E;
}

/* PLAYER */
.player{width:260px;background:#0F172A;border:2px solid #22C55E;border-radius:12px;padding:10px;position:relative;}
.live-dot{width:8px;height:8px;background:#22C55E;border-radius:50%;position:absolute;top:8px;left:8px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
.screen{width:100%;aspect-ratio:16/9;border:2px solid #1E293B;border-radius:8px;overflow:hidden;}
.screen iframe{width:100%;height:100%;border:none;}
.controls{display:flex;justify-content:center;gap:10px;margin-top:8px;}
.controls button{background:#1E293B;color:#E2E8F0;border:1px solid #1E293B;width:30px;height:24px;border-radius:7px;cursor:pointer;}

/* CALENDAR */
.calendar{width:260px;background:#0F172A;border-radius:14px;border:2px solid #1E293B;padding:10px;margin:auto;}
.days,.dates{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dates div{padding:6px 0;background:#1E293B;border-radius:6px;font-size:11px;}
.today{background:#22C55E !important;color:#0F172A;}

</style>  
</head>  
<body>  
<div class="rgbBorder"></div>  <div class="mainBox">  <div class="pixelGlowBox">  
<div class="pixelBorder"></div>  
<div id="pixelText">PIXEL GLOW</div>  
</div>  <div class="player">  
<div class="live-dot"></div>  
<div class="screen"><iframe id="playerFrame"></iframe></div>  
<div class="controls">  
<button onclick="prevSong()">⏮</button>  
<button onclick="toggleVideo()">▶</button>  
<button onclick="nextSong()">⏭</button>  
</div>  
</div>  <canvas id="gameCanvas"></canvas>

<div class="calendar"><div id="dates"></div></div>  </div>  <script>  
let songs=[{src:"https://youtu.be/kcsGhOmULxQ",name:"Song 1"}];  
let i=0;  
let frame=document.getElementById("playerFrame");  
function convert(u){return u.replace("youtu.be/","youtube.com/embed/");}  
function loadVideo(x){frame.src=convert(songs[x].src);}  
function nextSong(){i=(i+1)%songs.length;loadVideo(i);}  
function prevSong(){i=(i-1+songs.length)%songs.length;loadVideo(i);}  
function toggleVideo(){frame.contentWindow.postMessage('{"event":"command","func":"playVideo"}',"*");}  
loadVideo(0);  
</script>  <!-- FILLER START -->
