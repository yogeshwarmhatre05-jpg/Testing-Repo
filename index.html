<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR CSS EXACTLY SAME (UNCHANGED FOR BREVITY) */
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;background:radial-gradient(circle at top,#1f2f57,#090d18 65%);font-family:'Poppins',sans-serif;padding:20px;}
.main-layout{display:flex;gap:20px;align-items:flex-start;}
.right-side{display:flex;flex-direction:column;gap:20px;}
.sidebar{display:flex;flex-direction:column;gap:16px;}
.sidebar a{width:160px;padding:14px 18px;text-decoration:none;color:white;font-size:16px;font-weight:600;border-radius:18px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);box-shadow:0 10px 25px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.08);transition:0.25s;}
.sidebar a:hover{transform:translateX(6px) scale(1.03);background:linear-gradient(135deg,#5ea0ff,#7b6dff);}
.calendar{width:100px;height:200px;border-radius:30px;overflow:hidden;position:relative;background:rgba(255,255,255,0.06);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.15);box-shadow:0 20px 45px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;}
.top{width:100%;height:90px;background:linear-gradient(135deg,#5ea0ff,#7b6dff);display:flex;align-items:center;justify-content:center;position:relative;}
.month{color:white;font-size:28px;font-weight:700;letter-spacing:2px;z-index:2;text-transform:uppercase;}
.content{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.date{font-size:96px;font-weight:700;color:white;line-height:1;}
.year{margin-top:12px;font-size:16px;letter-spacing:4px;color:rgba(255,255,255,0.65);}
.links-box{width:260px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:18px;backdrop-filter:blur(10px);box-shadow:0 0 25px rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:14px;}
.top-links{display:flex;gap:12px;}
.side-btn{flex:1;text-decoration:none;color:white;background:linear-gradient(135deg,#2f2f2f,#454545);padding:14px;border-radius:14px;text-align:center;font-size:15px;font-weight:600;transition:0.3s;}
.side-btn:hover{transform:translateY(-2px);background:linear-gradient(135deg,#444,#666);}
.full{width:100%;}
.player{width:260px;background:#0F172A;border:2px solid #22C55E;border-radius:12px;padding:10px;position:relative;}
.live-dot{width:8px;height:8px;background:#22C55E;border-radius:50%;position:absolute;top:8px;left:8px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
.marquee{width:100%;overflow:hidden;white-space:nowrap;font-size:11px;margin-bottom:6px;color:#22C55E;}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 8s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
.screen{width:100%;aspect-ratio:16/9;border:2px solid #1E293B;border-radius:8px;overflow:hidden;}
.screen iframe{width:100%;height:100%;border:none;}
.controls{display:flex;justify-content:center;gap:10px;margin-top:8px;}
.controls button{background:#1E293B;color:#E2E8F0;border:1px solid #1E293B;width:30px;height:24px;border-radius:7px;cursor:pointer;}
#toggleBtn{width:42px;font-weight:bold;background:linear-gradient(135deg,#22C55E,#16A34A);}
</style>
</head>

<body>

<div class="main-layout">

  <div class="calendar">
    <div class="top"><div class="month" id="month"></div></div>
    <div class="content">
      <div class="date" id="date"></div>
      <div class="year" id="year"></div>
    </div>
  </div>

  <div class="right-side">

    <div class="sidebar">
      <a href="#">Review</a>
      <a href="#">Insight</a>
      <a href="#">Ads</a>
    </div>

    <div class="links-box">
      <div class="top-links">
        <a href="#" class="side-btn">Owner</a>
        <a href="#" class="side-btn">Co Owner</a>
      </div>
      <a href="#" class="side-btn full">Club Rules</a>
      <a href="#" class="side-btn full">Announcements</a>
      <a href="#" class="side-btn full">Join Events</a>
    </div>

    <div class="player">
      <div class="live-dot"></div>

      <div class="marquee">
        <span id="songText">Now Playing:</span>
      </div>

      <div class="screen">
        <iframe
          id="playerFrame"
          src=""
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>
      </div>

      <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="toggleBtn" onclick="toggleVideo()">▶</button>
        <button onclick="nextSong()">⏭</button>
      </div>

    </div>

  </div>
</div>

<script>
const today = new Date();

const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

document.getElementById("month").innerText = months[today.getMonth()];
document.getElementById("date").innerText = today.getDate();
document.getElementById("year").innerText = today.getFullYear();

let songs = [
  {src:"https://youtu.be/kcsGhOmULxQ", name:"Golden Brown - The Stranglers"},
  {src:"https://youtu.be/_XeE2aEiPHk", name:"The Flame of Love - Rokudenashi"},
  {src:"https://youtu.be/qdpXxGPqW-Y", name:"Faded - Alan Walker"},
  {src:"https://youtu.be/k50D8-EvNxk", name:"Meu Abrigo - Melim"},
  {src:"https://youtu.be/7WoVX2X3SQw", name:"Motagem Renaido - Jmilton"}
];

let songIndex = 0;
let isPlaying = false;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");
const toggleBtn = document.getElementById("toggleBtn");

function convert(url){
  let id = url.split("youtu.be/")[1].split("?")[0];
  return `https://www.youtube.com/embed/${id}?enablejsapi=1&origin=${window.location.origin}`;
}

function loadVideo(i){
  frame.src = convert(songs[i].src);
  songText.innerText = "Now Playing: " + songs[i].name;
  toggleBtn.innerText = "▶";
  isPlaying = false;
}

function prevSong(){
  songIndex = (songIndex - 1 + songs.length) % songs.length;
  loadVideo(songIndex);
}

function nextSong(){
  songIndex = (songIndex + 1) % songs.length;
  loadVideo(songIndex);
}

function toggleVideo(){
  const cmd = isPlaying ? "pauseVideo" : "playVideo";

  frame.contentWindow.postMessage(
    JSON.stringify({
      event: "command",
      func: cmd,
      args: ""
    }),
    "*"
  );

  toggleBtn.innerText = isPlaying ? "▶" : "❚❚";
  isPlaying = !isPlaying;
}

loadVideo(songIndex);
</script>

</body>
</html>
