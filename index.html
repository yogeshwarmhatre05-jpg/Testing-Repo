<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;

  background: radial-gradient(circle at top,#1f2f57,#090d18 65%);
  font-family:'Poppins',sans-serif;
  padding:20px;
}

/* MAIN LAYOUT */
.main-layout{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

/* LEFT COLUMN (CALENDAR + ADS/REVIEW + LINKS) */
.left-side{
  display:flex;
  flex-direction:column;
  gap:20px;
  width:260px;
}

/* RIGHT SIDE (PLAYER ONLY) */
.right-side{
  width:260px;
  display:flex;
  flex-direction:column;
}

/* CALENDAR */
.calendar{
  width:100%;
  height:300px;
  border-radius:30px;
  overflow:hidden;
  position:relative;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 20px 45px rgba(0,0,0,0.45);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TOP */
.top{
  width:100%;
  height:90px;
  background:linear-gradient(135deg,#5ea0ff,#7b6dff);
  display:flex;
  align-items:center;
  justify-content:center;
}

.month{
  color:white;
  font-size:28px;
  font-weight:700;
  letter-spacing:2px;
}

/* DATE */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.date{
  font-size:96px;
  font-weight:700;
  color:white;
}

.year{
  font-size:16px;
  color:rgba(255,255,255,0.65);
  letter-spacing:4px;
}

/* SIDEBAR */
.sidebar{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.sidebar a{
  width:100%;
  padding:14px 18px;
  text-decoration:none;
  color:white;
  font-weight:600;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  transition:0.25s;
}

.sidebar a:hover{
  transform:translateX(6px);
  background:linear-gradient(135deg,#5ea0ff,#7b6dff);
}

/* LINKS BOX */
.links-box{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-links{
  display:flex;
  gap:12px;
}

.side-btn{
  flex:1;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2f2f2f,#454545);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
}

.full{ width:100%; }

/* PLAYER */
.player{
  width:100%;
  background:#0F172A;
  border:2px solid #22C55E;
  border-radius:12px;
  padding:10px;
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

</style>
</head>

<body>

<div class="main-layout">

  <!-- LEFT SIDE (COMBINED COLUMN) -->
  <div class="left-side">

    <div class="calendar">
      <div class="top"><div class="month" id="month"></div></div>
      <div class="content">
        <div class="date" id="date"></div>
        <div class="year" id="year"></div>
      </div>
    </div>

    <div class="sidebar">
      <a href="#">Review</a>
      <a href="#">Insight</a>
      <a href="#">Ads</a>
    </div>

    <div class="links-box">
      <div class="top-links">
        <a href="#" class="side-btn">Owner</a>
        <a href="#" class="side-btn">Co Owner</a>
      </div>
      <a href="#" class="side-btn full">Club Rules</a>
      <a href="#" class="side-btn full">Announcements</a>
      <a href="#" class="side-btn full">Join Events</a>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side">
    <div class="player">
      <iframe></iframe>
    </div>
  </div>

</div>

</body>
</html>
