<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0a192f; /* Premium Navy Blue */
    color:white;
    text-align:center;
    padding:30px 15px;
}

.owner{
    font-size:14px;
    letter-spacing:3px;
    margin-bottom:15px;
    opacity:0.8;
}

.profile-pic{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.name{
    font-size:32px;
    font-weight:bold;
    margin-top:15px;
    margin-bottom:40px;
}

iframe{
    width:100%;
    max-width:700px;
    height:400px;
    border:none;
    border-radius:12px;
    margin-bottom:40px;
}

.link-btn{
    display:block;
    width:100%;
    max-width:400px;
    margin:12px auto;
    padding:14px;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:10px;
    font-weight:bold;
}

.link-btn:hover{
    background:rgba(255,255,255,0.08);
}

h2{
    margin-top:40px;
    margin-bottom:10px;
}

p{
    max-width:700px;
    margin:0 auto 20px;
    line-height:1.7;
}
</style>
</head>
<body>

<p class="owner">OWNER</p>

<img src="your-image.jpg" class="profile-pic" alt="Owner">

<h1 class="name">Your Name</h1>

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

<a href="#" class="link-btn">Website</a>
<a href="#" class="link-btn">YouTube</a>
<a href="#" class="link-btn">Discord</a>
<a href="#" class="link-btn">Contact</a>

<h2>🎯 Goal</h2>

<p>
Build a strong community, improve skills, and create a
friendly environment for everyone.
</p>

<h2>⚠ Warning</h2>

<p>
Respect all members. Spamming, cheating, or abusive
behavior may result in removal.
</p>

</body>
</html>
