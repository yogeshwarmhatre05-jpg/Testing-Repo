<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@700&family=Russo+One&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background:#0F172A;
color:#E2E8F0;
font-family:'Poppins',sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* GLOBAL RGB BORDER */
.rgbBorder{
position:fixed;
inset:0;
padding:3px;
background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0F172A;
}

@keyframes rgbMove{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

/* MAIN BOX */
.mainBox{
width:320px;
margin:20px auto;
padding:14px;
text-align:center;
border-radius:12px;
background:#0F172A;
}

/* PIXEL GLOW */
.pixelGlowBox{
width:270px;
height:70px;
margin:auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
overflow:hidden;
}

.pixelRgbBorder{
position:absolute;
inset:0;
padding:3px;
background:linear-gradient(90deg,#ff004c,#ffae00,#ffee00,#00ff66,#00e5ff,#7a00ff,#ff004c);
background-size:400% 400%;
animation:rgbMove 6s linear infinite;
}

.pixelRgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0F172A;
border-radius:12px;
}

#pixelText{
position:relative;
z-index:2;
font-size:1.2rem;
font-family:'Russo One','Orbitron',sans-serif;
letter-spacing:4px;
color:#00ffcc;
text-shadow:0 0 6px #00ffcc,0 0 12px #00e5ff,0 0 20px #7a00ff;
animation:glowPulse 2.5s infinite;
}

@keyframes glowPulse{
0%{transform:scale(1);filter:brightness(1);}
50%{transform:scale(1.05);filter:brightness(1.4);}
100%{transform:scale(1);filter:brightness(1);}
}

/* TEXT */
.line{
height:1px;
background:rgba(255,255,255,0.15);
margin:10px 20px;
}

/* ================= PLAYER ================= */

.player{
width:270px;
margin:20px auto;
position:relative;
border-radius:12px;
padding:10px;
overflow:hidden;
}

/* SAME RGB BORDER AS BODY (NO SHADOW) */
.player::before{
content:"";
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(
90deg,
#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000
);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
}

.player::after{
content:"";
position:absolute;
inset:2px;
background:#0F172A;
border-radius:10px;
}

.player > *{
position:relative;
z-index:2;
}

/* PLAYER UI */
.live-dot{
width:8px;
height:8px;
background:#22C55E;
border-radius:50%;
position:absolute;
top:8px;
left:8px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

.marquee{
overflow:hidden;
white-space:nowrap;
font-size:11px;
margin-bottom:6px;
color:#22C55E;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:8px;
overflow:hidden;
border:2px solid #1E293B;
}

.screen iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.controls button{
background:#1E293B;
color:#E2E8F0;
border:none;
width:30px;
height:24px;
border-radius:7px;
cursor:pointer;
}

#toggleBtn{
width:42px;
background:#22C55E;
color:#000;
font-weight:bold;
}

</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

  <div class="pixelGlowBox">
    <div class="pixelRgbBorder"></div>
    <div id="pixelText">PIXEL GLOW</div>
  </div>

  <br>

  <div>♣ Welcome to Our Club ♣</div>

  <br>

  <div>✧ OWNER ✧</div>

  <img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png"
  width="250" height="333">

  <div style="font-size:22px;font-weight:800;margin-top:6px;">
    √𝓎𝓸𝓰𝓲136
  </div>

  <div class="line"></div>

  <div style="font-size:12px;font-style:italic;">
    “Think like a King. Play like a Master.”
  </div>

  <!-- PLAYER INSIDE MAIN BOX -->
  <div class="player">

    <div class="live-dot"></div>

    <div class="marquee">
      <span id="songText">Now Playing:</span>
    </div>

    <div class="screen">
      <iframe id="playerFrame" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button id="toggleBtn" onclick="toggleVideo()">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

  </div>

</div>

<script>

let songs=[
{src:"https://youtu.be/kcsGhOmULxQ",name:"Golden Brown"},
{src:"https://youtu.be/_XeE2aEiPHk",name:"Rokudenashi"},
{src:"https://youtu.be/qdpXxGPqW-Y",name:"Faded"}
];

let songIndex=0;
let isPlaying=false;

const frame=document.getElementById("playerFrame");
const songText=document.getElementById("songText");
const toggleBtn=document.getElementById("toggleBtn");

function convert(url){
let id=url.split("youtu.be/")[1]?.split("?")[0];
return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
}

function loadVideo(i){
frame.src=convert(songs[i].src);
songText.innerText="Now Playing: "+songs[i].name;
toggleBtn.innerText="▶";
isPlaying=false;
}

function prevSong(){
songIndex=(songIndex-1+songs.length)%songs.length;
loadVideo(songIndex);
}

function nextSong(){
songIndex=(songIndex+1)%songs.length;
loadVideo(songIndex);
}

function toggleVideo(){
frame.contentWindow.postMessage(
JSON.stringify({
event:"command",
func:isPlaying?"pauseVideo":"playVideo",
args:""
}),
"*"
);

isPlaying=!isPlaying;
toggleBtn.innerText=isPlaying?"❚❚":"▶";
}

loadVideo(songIndex);

</script>

</body>
</html>
