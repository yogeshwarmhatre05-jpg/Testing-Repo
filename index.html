<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>*{ box-sizing:border-box; }

html, body{ margin:0; padding:0; background:#0F172A; color:#E2E8F0; font-family:Arial,sans-serif; min-height:100vh; overflow-x:hidden; transition:background 1s ease; }

body{ position:relative; }

.rgbBorder{ position:fixed; inset:0; padding:3px; background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000); background-size:400% 400%; animation:rgbMove 8s linear infinite; z-index:-1; }

.rgbBorder::before{ content:""; position:absolute; inset:3px; background:#0F172A; }

@keyframes rgbMove{ 0%{background-position:0% 50%;} 100%{background-position:400% 50%;} } @keyframes discoRGB{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

.mainBox{ width:300px; margin:auto; padding:14px; text-align:center; border:2px solid #1E293B; border-radius:12px; background:#0F172A; transition:all 1s ease; }

.themeText{ color:#22C55E; transition:all 1s ease; }

.line{ height:1px; background:rgba(255,255,255,0.15); margin:8px 20px; }

.pixelGlowBox{ width:270px; height:60px; margin:auto; position:relative; overflow:hidden; border-radius:10px; }

.pixelBorder{ position:absolute; inset:0; padding:2px; background:linear-gradient(90deg,#22C55E,white,#22C55E); background-size:300% 300%; animation:discoRGB 6s ease-in-out infinite; }

.pixelBorder::before{ content:""; position:absolute; inset:2px; background:#0F172A; }

#pixelText{ position:absolute; inset:0; display:flex; justify-content:center; align-items:center; font-size:1rem; font-family:'Montserrat',sans-serif; font-weight:700; letter-spacing:2px; z-index:2; color:#22C55E; -webkit-text-stroke:1px #000; }

.player{ width:260px; background:#0F172A; border:2px solid #1E293B; border-radius:10px; padding:8px; margin:auto; position:relative; }

.live-dot{ width:8px;height:8px;background:#22C55E;border-radius:50%;position:absolute;top:6px;left:6px;box-shadow:0 0 8px #22C55E;animation:pulse 1.2s infinite; }

@keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}

.marquee{ width:100%; overflow:hidden; white-space:nowrap; font-size:11px; margin-bottom:4px; } .marquee span{ display:inline-block; padding-left:100%; animation:scroll 6s linear infinite; } @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

.screen{ width:100%; aspect-ratio:16/9; border:2px solid #1E293B; border-radius:6px; overflow:hidden; } .screen iframe{ width:100%; height:100%; border:none; }

.controls{ display:flex; justify-content:center; gap:10px; margin-top:5px; } .controls button{ background:#1E293B;color:#E2E8F0;border:1px solid #1E293B;width:28px;height:20px;border-radius:5px;cursor:pointer; }

.calendar{ width:260px;background:#0F172A;border-radius:14px;border:2px solid #1E293B;padding:10px;margin:auto; } .header{ font-size:15px;margin-bottom:8px;color:#22C55E;font-weight:700; } .days,.dates{ display:grid;grid-template-columns:repeat(7,1fr);gap:4px; } .days div{ font-size:11px; } .dates div{ padding:6px 0;border-radius:6px;background:#1E293B;font-size:11px; } .today{ background:#22C55E !important;color:#0F172A; }

.section{ border:2px solid #1E293B;border-radius:12px;padding:15px;background:#0F172A;width:270px;margin:auto; } .section-title{ background:#1E293B;border-radius:30px;padding:10px;margin-bottom:15px;color:#22C55E;font-weight:bold; } .partner-card{ background:#1E293B;border-radius:14px;padding:15px;text-align:center;margin-bottom:12px;cursor:pointer; } .partner-card:hover{ transform:scale(1.03); } .partner-img{ width:70px;height:70px;border-radius:12px;object-fit:cover; } .partner-name{ margin-top:8px;font-size:14px; }

</style>
</head>
<body><div class="rgbBorder"></div><div class="mainBox">  <div class="pixelGlowBox">
    <div class="pixelBorder"></div>
    <div id="pixelText">PIXEL GLOW</div>
  </div>  <br>  <div class="themeText" style="font-size:15px;letter-spacing:2px;overflow:hidden;">
    <marquee scrollamount="3">♣Welcome to Our Club♣</marquee>
  </div>  <br>  <div style="font-size:11px;letter-spacing:3px;">
    <span class="themeText" style="font-size:14px;">✧ 𝐎 𝐖 𝐍 𝐄 𝐑 ✧</span>
  </div>  <div style="margin-top:6px;">
    <img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png" width="100" height="100" style="border-radius:12px;border:2px solid #1E293B;">
  </div>  <div class="themeText" style="font-size:22px;font-weight:900;font-family:cursive;margin-top:6px;">
    √𝓎𝓸𝓰𝓲136
  </div>  <div class="line"></div>  <div style="font-size:12px;font-style:italic;">“Think like a King. Play like a Master.”</div>  <br>  <div class="player">
    <div class="live-dot"></div>
    <div class="marquee"><span id="songText">Now Playing:</span></div>
    <div class="screen"><iframe id="playerFrame" allow="autoplay; fullscreen" allowfullscreen></iframe></div>
    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="playVideo()">▶</button>
      <button onclick="pauseVideo()">❚❚</button>
      <button onclick="nextSong()">⏭</button>
    </div>
  </div>  <br>  <div class="calendar">
    <div class="header" id="monthYear"></div>
    <div class="days">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    <div class="dates" id="dates"></div>
  </div>  <br>  <div class="section">
    <div class="section-title">◆ PARTNERS ◆</div>
    <div id="partnersContainer"></div>
  </div>  <br></div><script>

let songs = [/* unchanged songs array */];
let songIndex = 0;
const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");

function convert(url){
  if(url.includes("youtu.be")){
    let id = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id + "?enablejsapi=1";
  }
  return url;
}

function loadVideo(i){
  frame.src = convert(songs[i].src);
  songText.innerText = "Now Playing: " + songs[i].name;
}

function prevSong(){ songIndex = (songIndex - 1 + songs.length) % songs.length; loadVideo(songIndex); }
function nextSong(){ songIndex = (songIndex + 1) % songs.length; loadVideo(songIndex); }
function playVideo(){ frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*"); }
function pauseVideo(){ frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*"); }

loadVideo(songIndex);

/* CALENDAR (unchanged) */
const monthYear=document.getElementById("monthYear");
const dates=document.getElementById("dates");
const now=new Date();
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
monthYear.innerText=months[now.getMonth()] + " " + now.getFullYear();
const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
const lastDate=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
for(let i=0;i<firstDay;i++) dates.innerHTML+="<div></div>";
for(let i=1;i<=lastDate;i++) dates.innerHTML+=`<div class='${i===now.getDate()?"today":""}'>${i}</div>`;

/* PARTNERS */
const partners=[
{name:"SAPPHIRE",img:"https://i.ibb.co/4RYLGQ3z/image.jpg",link:"https://www.chess.com/club/sapphire-1"},
{name:"penguin chess club",img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",link:"https://www.chess.com/club/penguin-chess-club-3"}
];

const container=document.getElementById("partnersContainer");
partners.forEach(p=>{
  const card=document.createElement("div");
  card.className="partner-card";
  card.innerHTML=`<img src="${p.img}" class="partner-img"><div class="partner-name">${p.name}</div>`;
  card.onclick=()=>window.open(p.link,"_blank");
  container.appendChild(card);
});

/* BUBBLE GAME REMOVED */

</script></body>
</html>
