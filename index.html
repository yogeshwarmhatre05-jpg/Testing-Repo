<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Bot Frontend</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.chat-container{
  width:95%;
  max-width:420px;
  height:90vh;
  background:#111827;
  border:2px solid #38bdf8;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 30px rgba(56,189,248,0.3);
}

.header{
  background:linear-gradient(90deg,#06b6d4,#3b82f6);
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:600;
  color:white;
  letter-spacing:1px;
}

.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.message{
  max-width:80%;
  padding:12px 15px;
  border-radius:16px;
  font-size:14px;
  line-height:1.4;
}

.bot{
  background:#1e293b;
  color:#e2e8f0;
  align-self:flex-start;
  border:1px solid #38bdf8;
}

.user{
  background:#38bdf8;
  color:white;
  align-self:flex-end;
}

.input-area{
  display:flex;
  padding:12px;
  background:#0f172a;
  border-top:1px solid #1e293b;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  font-size:14px;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#06b6d4;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0891b2;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    AI BOT
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      Hello 👋 Ask me anything
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
function sendMessage(){

  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  if(input.value.trim() === "") return;

  // User message
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = input.value;
  chatBox.appendChild(userMsg);

  // Bot reply
  setTimeout(() => {
    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "You said: " + input.value;
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
