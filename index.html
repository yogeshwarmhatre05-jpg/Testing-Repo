<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background: radial-gradient(circle at top, #111827, #0b1220);
color:#d7e2f0;
font-family:'Poppins',sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* RGB BORDER */
.rgbBorder{
position:fixed;
inset:0;
padding:3px;
background:linear-gradient(
90deg,
#ff4d4d,#ffb84d,#fff36a,#5cff7a,#4dd2ff,#6a7bff,#c77dff,#ff4d4d
);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
opacity:0.85;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0b1220;
}

@keyframes rgbMove{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

/* MAIN BOX */
.mainBox{
width:300px;
margin:20px auto;
padding:14px;
text-align:center;
background:#0b1220;
border-radius:12px;
border:1px solid rgba(124,255,178,0.25);
}

/* PIXEL */
.pixelGlowBox{
width:270px;
height:60px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

.pixelBorder{
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(90deg,#7CFFB2,white,#7CFFB2);
background-size:300% 300%;
animation:rgbMove 6s ease-in-out infinite;
}

.pixelBorder::before{
content:"";
position:absolute;
inset:2px;
background:#0b1220;
}

#pixelText{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;
font-weight:700;
letter-spacing:2px;
}

/* NAV LINKS (NEW - ABOVE PLAYER) */
.links{
display:flex;
flex-direction:column;
gap:10px;
margin-top:12px;
}

.topRow{
display:flex;
gap:10px;
}

.linkBtn{
flex:1;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:13px;
font-weight:600;
color:#d7e2f0;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:0.2s;
}

.linkBtn:hover{
background:rgba(124,255,178,0.12);
border-color:#7CFFB2;
color:#7CFFB2;
}

.full{
width:100%;
}

/* PLAYER */
.player{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:10px;
position:relative;
}

.live-dot{
width:8px;
height:8px;
background:#7CFFB2;
border-radius:50%;
position:absolute;
top:8px;
left:8px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.marquee{
width:100%;
overflow:hidden;
white-space:nowrap;
font-size:11px;
margin-bottom:6px;
color:#7CFFB2;
}

.screen{
width:100%;
aspect-ratio:16/9;
border:1px solid rgba(124,255,178,0.25);
border-radius:8px;
overflow:hidden;
}

.screen iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.controls button{
background:rgba(255,255,255,0.05);
color:#d7e2f0;
border:1px solid rgba(255,255,255,0.08);
width:32px;
height:26px;
border-radius:7px;
cursor:pointer;
}

#toggleBtn{
background:#7CFFB2;
color:#0b1220;
font-weight:bold;
}

/* CALENDAR */
.box{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:12px;
}

.title{
text-align:center;
font-weight:700;
color:#7CFFB2;
font-size:16px;
}

.days,.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
margin-top:10px;
}

.today{
background:#7CFFB2 !important;
color:#0b1220;
font-weight:bold;
}

/* PARTNERS */
.section{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:12px;
}

.section-title{
text-align:center;
color:#7CFFB2;
font-weight:bold;
margin-bottom:10px;
}

.partner-card{
background:rgba(255,255,255,0.04);
border-radius:12px;
padding:12px;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
}

.partner-card:hover{
transform:scale(1.03);
border-color:#7CFFB2;
}

.partner-img{
width:65px;
height:65px;
border-radius:10px;
object-fit:cover;
}

.partner-name{
margin-top:6px;
font-size:13px;
}
</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

<!-- HEADER -->
<div class="pixelGlowBox">
<div class="pixelBorder"></div>
<div id="pixelText">PIXEL GLOW</div>
</div>

<br>

<img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png" width="250">

<!-- ✅ LINKS ADDED ABOVE PLAYER -->
<div class="links">

<div class="topRow">
<a class="linkBtn" href="#">Owner</a>
<a class="linkBtn" href="#">Co Owner</a>
</div>

<a class="linkBtn full" href="#">Club Rules</a>
<a class="linkBtn full" href="#">Announcements</a>
<a class="linkBtn full" href="#">Join Events</a>

</div>

<!-- PLAYER -->
<div class="player">

<div class="live-dot"></div>

<div class="marquee">
<span id="songText">Now Playing</span>
</div>

<div class="screen">
<iframe id="playerFrame" allow="autoplay; encrypted-media; fullscreen"></iframe>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button id="toggleBtn" onclick="toggleVideo()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<!-- CALENDAR -->
<div class="box">
<div class="title">🌷 My Cute Calendar</div>

<div class="days"></div>
<div class="calendar"></div>
</div>

<!-- PARTNERS -->
<div class="section">
<div class="section-title">◆ PARTNERS ◆</div>
<div id="partnersContainer"></div>
</div>

</div>

<script>
let songs=[
{src:"https://youtu.be/kcsGhOmULxQ",name:"Golden Brown"},
{src:"https://youtu.be/_XeE2aEiPHk",name:"Flame of Love"},
{src:"https://youtu.be/qdpXxGPqW-Y",name:"Faded"}
];

let i=0;
let isPlaying=false;

const frame=document.getElementById("playerFrame");
const songText=document.getElementById("songText");
const btn=document.getElementById("toggleBtn");

function getId(url){
if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
if(url.includes("watch?v=")) return url.split("watch?v=")[1].split("&")[0];
return url;
}

function convert(url){
return `https://www.youtube.com/embed/${getId(url)}?enablejsapi=1&rel=0`;
}

function load(){
frame.src=convert(songs[i].src);
songText.innerText="Now Playing: "+songs[i].name;
btn.innerText="▶";
isPlaying=false;
}

function nextSong(){i=(i+1)%songs.length;load();}
function prevSong(){i=(i-1+songs.length)%songs.length;load();}

function toggleVideo(){
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:isPlaying?"pauseVideo":"playVideo",
args:[]
}),"*");

isPlaying=!isPlaying;
btn.innerText=isPlaying?"❚❚":"▶";
}

load();

/* PARTNERS */
const partners=[
{name:"SAPPHIRE",img:"https://i.ibb.co/4RYLGQ3z/image.jpg",link:"https://www.chess.com/club/sapphire-1"},
{name:"PENGUIN CHESS CLUB",img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",link:"https://www.chess.com/club/penguin-chess-club-3"}
];

const container=document.getElementById("partnersContainer");

partners.forEach(p=>{
const card=document.createElement("div");
card.className="partner-card";

card.innerHTML=`
<img src="${p.img}" class="partner-img">
<div class="partner-name">${p.name}</div>
`;

card.onclick=()=>window.open(p.link,"_blank");

container.appendChild(card);
});
</script>

</body>
</html>
