<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background:#0F172A;
color:#E2E8F0;
font-family:'Poppins',sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* 🌈 RGB BORDER BACKGROUND */
.rgbBorder{
position:fixed;
inset:0;
padding:3px;
background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0F172A;
}

@keyframes rgbMove{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

/* 🧊 MAIN CONTAINER */
.mainBox{
width:300px;
margin:20px auto;
padding:14px;
text-align:center;
background:#0F172A;
border-radius:12px;
border:2px solid #1E293B;
}

/* ✨ PIXEL GLOW HEADER */
.pixelGlowBox{
width:270px;
height:60px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

.pixelBorder{
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(90deg,#22C55E,white,#22C55E);
background-size:300% 300%;
animation:rgbMove 6s ease-in-out infinite;
}

.pixelBorder::before{
content:"";
position:absolute;
inset:2px;
background:#0F172A;
}

#pixelText{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:1rem;
font-family:'Orbitron',sans-serif;
font-weight:700;
letter-spacing:2px;
}

/* 🎥 PLAYER BOX */
.player{
width:270px;
margin:20px auto;
background:#0F172A;
border:2px solid #22C55E;
border-radius:12px;
padding:10px;
position:relative;
}

/* LIVE DOT */
.live-dot{
width:8px;
height:8px;
background:#22C55E;
border-radius:50%;
position:absolute;
top:8px;
left:8px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* SONG TITLE SCROLL */
.marquee{
width:100%;
overflow:hidden;
white-space:nowrap;
font-size:11px;
margin-bottom:6px;
color:#22C55E;
}

/* VIDEO SCREEN */
.screen{
width:100%;
aspect-ratio:16/9;
border:2px solid #1E293B;
border-radius:8px;
overflow:hidden;
}

.screen iframe{
width:100%;
height:100%;
border:none;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.controls button{
background:#1E293B;
color:#E2E8F0;
border:1px solid #1E293B;
width:32px;
height:26px;
border-radius:7px;
cursor:pointer;
}

#toggleBtn{
width:45px;
background:#22C55E;
color:black;
font-weight:bold;
}

/* 📅 CALENDAR */
.box{
width:270px;
margin:20px auto;
background:#0F172A;
border:2px solid #22C55E;
border-radius:12px;
padding:12px;
}

.title{
text-align:center;
font-weight:700;
color:#22C55E;
font-size:16px;
}

.subtitle{
text-align:center;
font-size:11px;
opacity:0.7;
margin-top:3px;
}

.days, .calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
margin-top:10px;
}

.days div{
font-size:10px;
opacity:0.6;
}

.calendar div{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
background:#1E293B;
border-radius:10px;
font-size:12px;
transition:0.2s;
cursor:pointer;
}

.calendar div:hover{
background:#22C55E;
color:black;
transform:scale(1.1);
}

.today{
background:#22C55E !important;
color:black;
font-weight:bold;
}

/* NAV BUTTONS */
.buttons{
display:flex;
gap:8px;
margin-top:12px;
}

.btn{
flex:1;
text-align:center;
padding:6px;
border-radius:8px;
font-size:11px;
text-decoration:none;
background:#1E293B;
color:white;
}

.btn:hover{
background:#22C55E;
color:black;
}
</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

<!-- HEADER -->
<div class="pixelGlowBox">
<div class="pixelBorder"></div>
<div id="pixelText">PIXEL GLOW</div>
</div>

<br>

<!-- IMAGE -->
<img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png" width="250">

<!-- PLAYER -->
<div class="player">

<div class="live-dot"></div>

<div class="marquee">
<span id="songText">Now Playing</span>
</div>

<div class="screen">
<iframe id="playerFrame"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen></iframe>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button id="toggleBtn" onclick="toggleVideo()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<!-- CALENDAR -->
<div class="box">

<div class="title">🌷 My Cute Calendar</div>
<div class="subtitle">soft vibes • pastel style</div>

<div class="days">
<div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
</div>

<div class="calendar">
<div></div><div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
<div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div>
<div>13</div><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div><div>19</div>
<div>20</div><div>21</div><div class="today">22</div><div>23</div><div>24</div><div>25</div><div>26</div>
<div>27</div><div>28</div><div>29</div><div>30</div><div>31</div><div></div><div></div>
</div>

<div class="buttons">
<a class="btn" href="#">Home</a>
<a class="btn" href="#">Notes</a>
<a class="btn" href="#">Profile</a>
</div>

</div>

</div>

<script>
let songs = [
  { src: "https://youtu.be/kcsGhOmULxQ", name: "Golden Brown" },
  { src: "https://youtu.be/_XeE2aEiPHk", name: "Flame of Love" },
  { src: "https://youtu.be/qdpXxGPqW-Y", name: "Faded" }
];

let i = 0;
let isPlaying = false;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");
const btn = document.getElementById("toggleBtn");

/* 🔧 FIX: extract video ID safely */
function getId(url) {
  if (url.includes("youtu.be/")) return url.split("youtu.be/")[1];
  if (url.includes("watch?v=")) return url.split("watch?v=")[1].split("&")[0];
  return url;
}

/* 🔧 FIX: build embed URL properly */
function convert(url) {
  return `https://www.youtube.com/embed/${getId(url)}?enablejsapi=1&rel=0`;
}

/* ▶ load song */
function load() {
  frame.src = convert(songs[i].src);
  songText.innerText = "Now Playing: " + songs[i].name;
  btn.innerText = "▶";
  isPlaying = false;
}

/* ⏭ next song */
function nextSong() {
  i = (i + 1) % songs.length;
  load();
}

/* ⏮ previous song */
function prevSong() {
  i = (i - 1 + songs.length) % songs.length;
  load();
}

/* ▶ pause/play toggle */
function toggleVideo() {
  frame.contentWindow.postMessage(JSON.stringify({
    event: "command",
    func: isPlaying ? "pauseVideo" : "playVideo",
    args: []
  }), "*");

  isPlaying = !isPlaying;
  btn.innerText = isPlaying ? "❚❚" : "▶";
}

load();
</script>

</body>
</html>
