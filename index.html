<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top, #1a2233, #0b1020);
color:#d7e2f0;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

/* soft vignette like old screens */
body::before{
content:"";
position:fixed;
inset:0;
background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6));
pointer-events:none;
}

/* MAIN APP */
.mainBox{
width:320px;
display:flex;
flex-direction:column;
gap:18px;
}

/* HEADER */
.header{
text-align:center;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter: blur(8px);
}

.header h1{
font-family:'Orbitron',sans-serif;
font-size:18px;
letter-spacing:2px;
color:#7CFFB2;
}

.header p{
font-size:11px;
opacity:0.6;
margin-top:4px;
}

/* IMAGE */
.hero{
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
}

.hero img{
width:100%;
display:block;
}

/* PLAYER CARD */
.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:12px;
backdrop-filter: blur(8px);
}

.live{
display:flex;
align-items:center;
gap:6px;
font-size:11px;
opacity:0.8;
margin-bottom:8px;
color:#7CFFB2;
}

.dot{
width:7px;
height:7px;
background:#7CFFB2;
border-radius:50%;
animation:pulse 1.6s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:10px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
}

iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:#d7e2f0;
padding:6px 10px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:rgba(124,255,178,0.15);
border-color:#7CFFB2;
}

#toggleBtn{
background:#7CFFB2;
color:#0b1020;
font-weight:600;
}

/* CALENDAR */
.calendar{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter: blur(8px);
}

.title{
font-size:14px;
text-align:center;
color:#7CFFB2;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
text-align:center;
font-size:11px;
}

.day{
opacity:0.5;
}

.date{
padding:6px 0;
border-radius:8px;
background:rgba(255,255,255,0.04);
transition:0.2s;
}

.date:hover{
background:rgba(124,255,178,0.15);
transform:scale(1.05);
}

.today{
background:#7CFFB2;
color:#0b1020;
font-weight:600;
}

.nav{
display:flex;
gap:8px;
margin-top:12px;
}

.nav a{
flex:1;
text-align:center;
padding:6px;
border-radius:10px;
text-decoration:none;
font-size:11px;
color:#d7e2f0;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.nav a:hover{
border-color:#7CFFB2;
color:#7CFFB2;
}
</style>
</head>

<body>

<div class="mainBox">

<!-- HEADER -->
<div class="header">
<h1>PIXEL GLOW CLUB</h1>
<p>a quiet nostalgic space</p>
</div>

<!-- IMAGE -->
<div class="hero">
<img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png">
</div>

<!-- PLAYER -->
<div class="card">

<div class="live">
<div class="dot"></div>
<span id="songText">Now Playing</span>
</div>

<div class="screen">
<iframe id="playerFrame"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen></iframe>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button id="toggleBtn" onclick="toggleVideo()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<!-- CALENDAR -->
<div class="calendar">

<div class="title">May 2026</div>

<div class="grid">
<div class="day">S</div><div class="day">M</div><div class="day">T</div><div class="day">W</div><div class="day">T</div><div class="day">F</div><div class="day">S</div>

<div class="date"></div><div class="date"></div><div class="date">1</div><div class="date">2</div><div class="date">3</div><div class="date">4</div><div class="date">5</div>
<div class="date">6</div><div class="date">7</div><div class="date">8</div><div class="date">9</div><div class="date">10</div><div class="date">11</div><div class="date">12</div>
<div class="date">13</div><div class="date">14</div><div class="date">15</div><div class="date">16</div><div class="date">17</div><div class="date">18</div><div class="date">19</div>
<div class="date">20</div><div class="date">21</div><div class="date today">22</div><div class="date">23</div><div class="date">24</div><div class="date">25</div><div class="date">26</div>
<div class="date">27</div><div class="date">28</div><div class="date">29</div><div class="date">30</div><div class="date">31</div>
</div>

<div class="nav">
<a href="#">Home</a>
<a href="#">Notes</a>
<a href="#">Profile</a>
</div>

</div>

</div>

<script>
let songs=[
{src:"https://youtu.be/kcsGhOmULxQ",name:"Golden Brown"},
{src:"https://youtu.be/_XeE2aEiPHk",name:"Flame of Love"},
{src:"https://youtu.be/qdpXxGPqW-Y",name:"Faded"}
];

let i=0;
let isPlaying=false;

const frame=document.getElementById("playerFrame");
const songText=document.getElementById("songText");
const btn=document.getElementById("toggleBtn");

function getId(url){
if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
if(url.includes("watch?v=")) return url.split("watch?v=")[1].split("&")[0];
return url;
}

function convert(url){
return `https://www.youtube.com/embed/${getId(url)}?enablejsapi=1&rel=0`;
}

function load(){
frame.src=convert(songs[i].src);
songText.innerText="Now Playing: "+songs[i].name;
btn.innerText="▶";
isPlaying=false;
}

function nextSong(){
i=(i+1)%songs.length;
load();
}

function prevSong(){
i=(i-1+songs.length)%songs.length;
load();
}

function toggleVideo(){
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:isPlaying?"pauseVideo":"playVideo",
args:[]
}),"*");

isPlaying=!isPlaying;
btn.innerText=isPlaying?"❚❚":"▶";
}

load();
</script>

</body>
</html>
