<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Box</title>

<style>

body{
  margin:0;
  background:#0b1220;
  font-family:Arial, sans-serif;
  padding:25px;
  color:white;
}

.box{
  max-width:750px;
  margin:auto;

  display:flex;
  justify-content:space-between;
  gap:20px;

  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

/* LEFT LINKS */
.links{
  width:55%;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.links a{
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.08);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
}

/* RIGHT IMAGE */
.image{
  width:40%;
}

.image img{
  width:100%;
  border-radius:16px;
}

@media(max-width:650px){
  .box{
    flex-direction:column;
  }
  .links,.image{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="box">

  <!-- LEFT LINKS -->
  <div class="links">
    <a href="#">Club Rules</a>
    <a href="#">Announcement</a>
    <a href="#">Join Events</a>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="image">
    <img src="IMAGE_URL_HERE" alt="Club Image">
  </div>

</div>

</body>
</html>
