<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background: radial-gradient(circle at top,#1f2f57,#090d18 65%);
  font-family:'Poppins',sans-serif;
  padding:20px;
}

/* MAIN WRAPPER */
.main-layout{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

/* LEFT SIDE (260px TOTAL COMBINED) */
.left-side{
  width:260px;
}

.combined{
  width:260px;
  display:flex;
  gap:10px;
}

/* CALENDAR */
.calendar{
  width:125px;
  height:300px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.15);
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.top{
  width:100%;
  height:80px;
  background:linear-gradient(135deg,#5ea0ff,#7b6dff);
  display:flex;
  align-items:center;
  justify-content:center;
}

.month{
  color:white;
  font-size:16px;
  font-weight:700;
  letter-spacing:1px;
}

.content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.date{
  font-size:60px;
  font-weight:700;
  color:white;
  line-height:1;
}

.year{
  font-size:12px;
  color:rgba(255,255,255,0.7);
  margin-top:10px;
  letter-spacing:2px;
}

/* SIDEBAR (ADS / REVIEW / INSIGHT) */
.sidebar{
  width:125px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebar a{
  width:100%;
  padding:10px;
  font-size:12px;
  font-weight:600;
  text-align:center;
  text-decoration:none;
  color:white;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  transition:0.25s;
}

.sidebar a:hover{
  transform:translateX(5px);
  background:linear-gradient(135deg,#5ea0ff,#7b6dff);
}

/* RIGHT SIDE */
.right-side{
  width:540px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* LINKS BOX */
.links-box{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-links{
  display:flex;
  gap:12px;
}

.side-btn{
  flex:1;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2f2f2f,#454545);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  transition:0.25s;
}

.side-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,#444,#666);
}

.full{
  width:100%;
}

/* PLAYER */
.player{
  width:100%;
  background:#0F172A;
  border:2px solid #22C55E;
  border-radius:12px;
  padding:10px;
  position:relative;
  box-shadow:0 0 25px rgba(34,197,94,0.25);
}

/* LIVE DOT */
.live-dot{
  width:8px;
  height:8px;
  background:#22C55E;
  border-radius:50%;
  position:absolute;
  top:8px;
  left:8px;
  box-shadow:0 0 8px #22C55E;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* MARQUEE */
.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:6px;
  color:#22C55E;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 8s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* VIDEO SCREEN */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border:2px solid #1E293B;
  border-radius:8px;
  overflow:hidden;
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:8px;
}

.controls button{
  background:#1E293B;
  color:#E2E8F0;
  border:1px solid #1E293B;
  width:30px;
  height:24px;
  border-radius:7px;
  cursor:pointer;
  transition:0.25s;
}

.controls button:hover{
  transform:translateY(-2px) scale(1.05);
  border-color:#22C55E;
}

#toggleBtn{
  width:42px;
  font-weight:bold;
  background:linear-gradient(135deg,#22C55E,#16A34A);
  border:none;
  color:white;
  box-shadow:0 0 12px rgba(34,197,94,0.45);
}

#toggleBtn:hover{
  transform:scale(1.08);
}

</style>
</head>

<body>

<div class="main-layout">

  <!-- LEFT (260px TOTAL) -->
  <div class="left-side">
    <div class="combined">

      <!-- CALENDAR -->
      <div class="calendar">
        <div class="top">
          <div class="month" id="month"></div>
        </div>
        <div class="content">
          <div class="date" id="date"></div>
          <div class="year" id="year"></div>
        </div>
      </div>

      <!-- LINKS -->
      <div class="sidebar">
        <a href="#">Review</a>
        <a href="#">Insight</a>
        <a href="#">Ads</a>
      </div>

    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side">

    <div class="links-box">
      <div class="top-links">
        <a href="#" class="side-btn">Owner</a>
        <a href="#" class="side-btn">Co Owner</a>
      </div>

      <a href="#" class="side-btn full">Club Rules</a>
      <a href="#" class="side-btn full">Announcements</a>
      <a href="#" class="side-btn full">Join Events</a>
    </div>

    <!-- PLAYER -->
    <div class="player">

      <div class="live-dot"></div>

      <div class="marquee">
        <span id="songText">Now Playing</span>
      </div>

      <div class="screen">
        <iframe id="playerFrame" allow="autoplay; fullscreen"></iframe>
      </div>

      <div class="controls">
        <button>⏮</button>
        <button id="toggleBtn">▶</button>
        <button>⏭</button>
      </div>

    </div>

  </div>

</div>

<script>
const today = new Date();

const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

document.getElementById("month").innerText = months[today.getMonth()];
document.getElementById("date").innerText = today.getDate();
document.getElementById("year").innerText = today.getFullYear();
</script>

</body>
</html>
