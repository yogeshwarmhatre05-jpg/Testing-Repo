<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nostalgia Club Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0B1020;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  color:#E5E7EB;
  padding:30px;
}

/* BACKGROUND GLOW */

body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#8B5CF6;
  filter:blur(140px);
  opacity:0.22;
  top:-120px;
  left:-120px;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#22D3EE;
  filter:blur(140px);
  opacity:0.18;
  bottom:-140px;
  right:-120px;
  z-index:-2;
}

/* MAIN LAYOUT */

.main-container{
  display:grid;
  grid-template-columns:320px 290px 220px;
  gap:22px;
  align-items:start;
}

/* GLASS STYLE */

.glass{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(14px);
  border-radius:24px;
  box-shadow:
  0 0 25px rgba(139,92,246,0.18),
  0 0 35px rgba(34,211,238,0.08);
}

/* LINKS PANEL */

.links-box{
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-links{
  display:flex;
  gap:12px;
}

.side-btn{
  flex:1;
  text-decoration:none;
  color:#E5E7EB;
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-size:15px;
  font-weight:600;

  background:
  linear-gradient(
  135deg,
  rgba(139,92,246,0.18),
  rgba(34,211,238,0.12)
  );

  border:1px solid rgba(255,255,255,0.08);

  transition:0.3s;
}

.full{
  width:100%;
}

.side-btn:hover{
  transform:translateY(-3px) scale(1.02);

  background:
  linear-gradient(
  135deg,
  rgba(139,92,246,0.35),
  rgba(34,211,238,0.22)
  );

  box-shadow:
  0 0 20px rgba(139,92,246,0.30),
  0 0 20px rgba(34,211,238,0.15);
}

/* MUSIC PLAYER */

.player{
  padding:14px;
  position:relative;
}

.live-dot{
  width:9px;
  height:9px;
  background:#22D3EE;
  border-radius:50%;
  position:absolute;
  top:12px;
  left:12px;
  box-shadow:0 0 10px #22D3EE;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee{
  overflow:hidden;
  white-space:nowrap;
  font-size:12px;
  margin-bottom:10px;
  color:#22D3EE;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 9s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.10);
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:14px;
}

.controls button{
  width:38px;
  height:32px;
  border:none;
  border-radius:12px;
  cursor:pointer;

  color:#E5E7EB;

  background:
  linear-gradient(
  135deg,
  rgba(139,92,246,0.25),
  rgba(34,211,238,0.18)
  );

  transition:0.25s;
}

.controls button:hover{
  transform:translateY(-2px) scale(1.05);

  box-shadow:
  0 0 18px rgba(139,92,246,0.25),
  0 0 18px rgba(34,211,238,0.12);
}

#toggleBtn{
  width:50px;
  font-weight:bold;
}

/* CALENDAR */

.calendar{
  overflow:hidden;
  position:relative;
  animation:float 4s ease-in-out infinite;
}

.top{
  height:90px;

  background:
  linear-gradient(
  135deg,
  #8B5CF6,
  #22D3EE
  );

  display:flex;
  align-items:center;
  justify-content:center;
}

.month{
  font-size:28px;
  font-weight:700;
  letter-spacing:2px;
}

.content{
  height:210px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.date{
  font-size:88px;
  font-weight:700;
  line-height:1;
}

.year{
  margin-top:10px;
  letter-spacing:4px;
  color:rgba(229,231,235,0.65);
}

.calendar::before,
.calendar::after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#0B1020;
  border-radius:50%;
  top:82px;
}

.calendar::before{
  left:-9px;
}

.calendar::after{
  right:-9px;
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }
}

/* MOBILE */

@media(max-width:950px){

  .main-container{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<div class="main-container">

  <!-- LINKS -->

  <div class="links-box glass">

    <div class="top-links">
      <a href="#" class="side-btn">Owner</a>
      <a href="#" class="side-btn">Co Owner</a>
    </div>

    <a href="#" class="side-btn full">Club Rules</a>
    <a href="#" class="side-btn full">Announcements</a>
    <a href="#" class="side-btn full">Join Events</a>

  </div>

  <!-- MUSIC PLAYER -->

  <div class="player glass">

    <div class="live-dot"></div>

    <div class="marquee">
      <span id="songText">
        Now Playing:
      </span>
    </div>

    <div class="screen">
      <iframe
      id="playerFrame"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen>
      </iframe>
    </div>

    <div class="controls">

      <button onclick="prevSong()">⏮</button>

      <button id="toggleBtn" onclick="toggleVideo()">▶</button>

      <button onclick="nextSong()">⏭</button>

    </div>

  </div>

  <!-- CALENDAR -->

  <div class="calendar glass">

    <div class="top">
      <div class="month" id="month"></div>
    </div>

    <div class="content">

      <div class="date" id="date"></div>

      <div class="year" id="year"></div>

    </div>

  </div>

</div>

<script>

/* CALENDAR */

const today = new Date();

const months = [
"JAN","FEB","MAR","APR",
"MAY","JUN","JUL","AUG",
"SEP","OCT","NOV","DEC"
];

document.getElementById("month").innerText =
months[today.getMonth()];

document.getElementById("date").innerText =
today.getDate();

document.getElementById("year").innerText =
today.getFullYear();

/* MUSIC PLAYER */

let songs = [

{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown - The Stranglers"
},

{
src:"https://youtu.be/_XeE2aEiPHk",
name:"The Flame of Love - Rokudenashi"
},

{
src:"https://youtu.be/qdpXxGPqW-Y",
name:"Faded - Alan Walker"
},

{
src:"https://youtu.be/7WoVX2X3SQw",
name:"Motagem Renaido - Jmilton"
}

];

let songIndex = 0;
let isPlaying = false;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");
const toggleBtn = document.getElementById("toggleBtn");

function convert(url){

if(url.includes("youtu.be")){

let id = url.split("youtu.be/")[1].split("?")[0];

return "https://www.youtube.com/embed/" +
id +
"?enablejsapi=1&rel=0";

}

return url;

}

function loadVideo(i){

frame.src = convert(songs[i].src);

songText.innerText =
"Now Playing: " + songs[i].name;

toggleBtn.innerText = "▶";

isPlaying = false;

}

function prevSong(){

songIndex--;

if(songIndex < 0){

songIndex = songs.length - 1;

}

loadVideo(songIndex);

}

function nextSong(){

songIndex++;

if(songIndex >= songs.length){

songIndex = 0;

}

loadVideo(songIndex);

}

function toggleVideo(){

if(!isPlaying){

frame.contentWindow.postMessage(
'{"event":"command","func":"playVideo","args":""}',
"*"
);

toggleBtn.innerText = "❚❚";

isPlaying = true;

}

else{

frame.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo","args":""}',
"*"
);

toggleBtn.innerText = "▶";

isPlaying = false;

}

}

loadVideo(songIndex);

</script>

</body>
</html>
