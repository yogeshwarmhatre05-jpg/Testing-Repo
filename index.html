<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
180deg,
#edf6f1,
#dcece5
);

color:#20322e;

padding:14px;

overflow-x:hidden;

}

/* BACKGROUND */

.bg{

position:fixed;

inset:0;

z-index:-10;

overflow:hidden;

}

.blur{

position:absolute;

border-radius:50%;

filter:blur(100px);

opacity:0.35;

animation:move 10s infinite alternate ease-in-out;

}

.blur1{

width:260px;
height:260px;

background:#bfe6d4;

top:-80px;
left:-80px;

}

.blur2{

width:260px;
height:260px;

background:#ffd4c9;

bottom:-80px;
right:-80px;

}

@keyframes move{

100%{

transform:
translateY(20px)
translateX(10px);

}

}

/* WRAPPER */

.wrapper{

max-width:315px;

margin:auto;

}

/* HERO */

.hero{

position:relative;

overflow:hidden;

padding:26px 18px 55px;

border-radius:38px;

background:
linear-gradient(
180deg,
#e8f4ef,
#dcece5
);

border:1px solid rgba(255,255,255,0.7);

box-shadow:
0 15px 35px rgba(0,0,0,0.06);

animation:floatHero 5s ease-in-out infinite;

}

@keyframes floatHero{

50%{

transform:translateY(-5px);

}

}

/* NATURE */

.sun{

position:absolute;

top:20px;
right:20px;

width:70px;
height:70px;

border-radius:50%;

background:#ffe6a8;

box-shadow:
0 0 50px #ffe6a8;

}

.cloud{

position:absolute;

background:
rgba(255,255,255,0.55);

border-radius:50px;

}

.c1{

width:80px;
height:28px;

top:85px;
left:10px;

}

.c2{

width:95px;
height:34px;

top:120px;
right:5px;

}

.hill{

position:absolute;

bottom:-20px;
left:-10%;

width:120%;
height:120px;

background:#aad9c5;

border-radius:50%;

}

.tree{

position:absolute;

bottom:10px;

font-size:55px;

}

.t1{
left:5px;
}

.t2{
right:5px;
}

/* LOGO */

.logoWrap{

display:flex;
justify-content:center;

position:relative;

z-index:2;

}

.logo{

position:relative;

width:100px;
height:100px;

padding:5px;

border-radius:30px;

background:
linear-gradient(
145deg,
#ffffff,
#dcece5
);

box-shadow:
0 8px 20px rgba(0,0,0,0.08);

}

.logo::before{

content:"";

position:absolute;

inset:5px;

background:#edf6f1;

border-radius:24px;

}

.logo img{

position:absolute;

inset:10px;

width:80px;
height:80px;

border-radius:20px;

object-fit:cover;

}

/* TITLE */

.title{

margin-top:20px;

font-family:'Orbitron',sans-serif;

font-size:30px;

letter-spacing:2px;

text-align:center;

position:relative;

z-index:2;

}

.subtitle{

margin-top:10px;

font-size:12px;

line-height:1.8;

text-align:center;

color:#60706a;

position:relative;

z-index:2;

}

/* STATS */

.stats{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-top:22px;

position:relative;

z-index:2;

}

.stat{

padding:14px 8px;

border-radius:22px;

background:#ffffffba;

backdrop-filter:blur(10px);

text-align:center;

border:1px solid rgba(255,255,255,0.6);

transition:0.35s;

}

.stat:hover{

transform:translateY(-4px);

}

.stat h2{

font-size:18px;

margin-bottom:4px;

}

.stat p{

font-size:9px;

letter-spacing:1px;

color:#72827d;

}

/* QUOTE */

.quote{

margin-top:18px;

padding:16px;

border-radius:22px;

background:#ffffffba;

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.7);

font-size:12px;

line-height:1.9;

text-align:center;

color:#586965;

}

/* LIVE */

.live{

margin-top:15px;

display:flex;
justify-content:center;
align-items:center;
gap:8px;

padding:12px;

border-radius:18px;

background:#ffffffba;

border:1px solid rgba(255,255,255,0.7);

font-size:11px;

}

.dot{

width:9px;
height:9px;

border-radius:50%;

background:#7dc8ab;

animation:
pulse 1.5s infinite,
glow 2s infinite alternate;

}

@keyframes pulse{

50%{

opacity:0.4;
transform:scale(0.8);

}

}

@keyframes glow{

100%{

box-shadow:
0 0 20px #7dc8ab;

}

}

/* SECTION */

.section{

margin-top:18px;

padding:18px;

border-radius:28px;

background:#ffffffba;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.7);

box-shadow:
0 8px 22px rgba(0,0,0,0.05);

transition:0.35s;

}

.section:hover{

transform:translateY(-4px);

}

.head{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;

}

.head h3{

font-size:16px;

}

.head span{

font-size:10px;

color:#7f9089;

}

/* FEATURES */

.featureGrid{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.feature{

padding:14px;

border-radius:20px;

background:white;

border:1px solid #dce8e3;

text-align:center;

transition:0.35s;

}

.feature:hover{

transform:translateY(-4px);

}

.featureIcon{

font-size:24px;

margin-bottom:8px;

}

.feature h4{

font-size:12px;

margin-bottom:5px;

}

.feature p{

font-size:10px;

line-height:1.6;

color:#6d7d78;

}

/* CALENDAR */

.calendarTop{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:6px;

margin-bottom:8px;

}

.calendarTop div{

text-align:center;

font-size:9px;

font-weight:600;

color:#7d8e87;

}

.calendar{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:6px;

}

.day{

aspect-ratio:1/1;

display:flex;
justify-content:center;
align-items:center;

border-radius:14px;

background:white;

font-size:10px;

box-shadow:
0 4px 10px rgba(0,0,0,0.04);

transition:0.25s;

}

.day:hover{

transform:scale(1.08);

}

.active{

background:
linear-gradient(
135deg,
#ff9d8e,
#ff7d6d
);

color:white;

font-weight:700;

}

.empty{

background:transparent;
box-shadow:none;

}

/* EVENTS */

.eventWrap{

display:flex;
flex-direction:column;
gap:12px;

}

.event{

padding:14px;

border-radius:20px;

background:white;

border:1px solid #dce8e3;

transition:0.35s;

}

.event:hover{

transform:translateY(-4px);

}

.eventTop{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:6px;

}

.event h4{

font-size:12px;

}

.badge{

padding:5px 10px;

border-radius:30px;

font-size:9px;

background:#dff4ea;

color:#2f7057;

font-weight:600;

}

.event p{

font-size:10px;

line-height:1.7;

color:#6f7f79;

margin-top:4px;

}

/* BUTTONS */

.links{

display:flex;
flex-direction:column;
gap:10px;

}

.row{

display:flex;
gap:10px;

}

.btn{

flex:1;

position:relative;

overflow:hidden;

padding:14px;

border-radius:18px;

text-decoration:none;

font-size:11px;
font-weight:600;

text-align:center;

color:white;

background:
linear-gradient(
135deg,
#ff9d8e,
#ff7d6d
);

transition:0.3s;

}

.btn:hover{

transform:translateY(-3px);

}

.btn::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:80%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.5),
transparent
);

transform:skewX(-20deg);

transition:0.7s;

}

.btn:hover::before{

left:130%;

}

/* PLAYER */

.player{

overflow:hidden;

border-radius:22px;

background:#edf6f1;

border:1px solid #d7e6df;

}

.song{

padding:12px;

font-size:10px;

overflow:hidden;

white-space:nowrap;

background:white;

}

.marquee{

display:inline-block;

padding-left:100%;

animation:scroll 12s linear infinite;

}

@keyframes scroll{

100%{

transform:translateX(-100%);

}

}

.screen{

aspect-ratio:16/9;

background:#ddebe5;

}

.screen iframe{

width:100%;
height:100%;

border:none;

}

.controls{

display:flex;
justify-content:center;
gap:10px;

padding:14px;

}

.controls button{

width:42px;
height:38px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#ff9d8e,
#ff7d6d
);

color:white;

font-size:15px;

cursor:pointer;

transition:0.3s;

}

.controls button:hover{

transform:translateY(-3px);

}

/* PARTNERS */

.partnerWrap{

display:flex;
flex-direction:column;
gap:10px;

}

.partner{

display:flex;
align-items:center;
gap:12px;

padding:12px;

border-radius:20px;

background:white;

border:1px solid #dce8e3;

transition:0.35s;

cursor:pointer;

}

.partner:hover{

transform:translateY(-4px);

}

.partner img{

width:52px;
height:52px;

border-radius:14px;

object-fit:cover;

}

.partner h4{

font-size:11px;

margin-bottom:3px;

}

.partner p{

font-size:9px;

line-height:1.6;

color:#6f7f79;

}

/* FOOTER */

.footer{

margin-top:22px;

padding-bottom:24px;

text-align:center;

font-size:10px;

line-height:1.8;

color:#6f7f79;

}

</style>

</head>

<body>

<div class="bg">

<div class="blur blur1"></div>
<div class="blur blur2"></div>

</div>

<div class="wrapper">

<div class="hero">

<div class="sun"></div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>

<div class="hill"></div>

<div class="tree t1">🌲</div>
<div class="tree t2">🌲</div>

<div class="logoWrap">

<div class="logo">

<img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png">

</div>

</div>

<div class="title">

PIXEL GLOW

</div>

<div class="subtitle">

Where peaceful design meets elite strategy and modern chess culture.

</div>

<div class="stats">

<div class="stat">

<h2>24/7</h2>

<p>ACTIVE</p>

</div>

<div class="stat">

<h2 id="memberCount">147</h2>

<p>MEMBERS</p>

</div>

<div class="stat">

<h2>∞</h2>

<p>TACTICS</p>

</div>

</div>

<div class="quote" id="quoteText">

Patience creates perfect moves.

</div>

<div class="live">

<div class="dot"></div>

<span id="onlineCount">23</span> Members Online

</div>

</div>

</div>

<script>

/* MEMBERS */

let totalMembers = 147;

let onlineMembers = 23;

function updateMembers(){

onlineMembers =
Math.floor(Math.random()*20)+15;

if(Math.random() > 0.88){

totalMembers++;

}

document.getElementById(
"memberCount"
).innerText = totalMembers;

document.getElementById(
"onlineCount"
).innerText = onlineMembers;

}

setInterval(updateMembers,5000);

updateMembers();

/* QUOTES */

const quotes=[

"Patience creates perfect moves.",

"Every move changes the battlefield.",

"Strategy defeats chaos.",

"Think deeply before every move.",

"Calm minds create brilliant tactics."

];

let q=0;

function rotateQuote(){

document.getElementById(
"quoteText"
).innerText = quotes[q];

q=(q+1)%quotes.length;

}

setInterval(rotateQuote,4000);

rotateQuote();

</script>

</body>
</html>
