<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background: radial-gradient(circle at top,#1f2f57,#090d18 65%);
  font-family:'Poppins',sans-serif;
  padding:20px;
}

/* WELCOME HEADER */

.welcome{
  font-size:42px;
  font-weight:800;
  letter-spacing:6px;
  color:#E2E8F0;
  margin-bottom:25px;
  text-transform:uppercase;
  text-shadow:
    0 0 10px #22C55E,
    0 0 20px #3B82F6,
    0 0 40px #8B5CF6;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow{
  0%{
    text-shadow:
      0 0 10px #22C55E,
      0 0 20px #3B82F6,
      0 0 40px #8B5CF6;
  }
  100%{
    text-shadow:
      0 0 20px #22C55E,
      0 0 35px #3B82F6,
      0 0 60px #8B5CF6;
  }
}

/* MAIN WRAPPER */

.container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

/* LEFT COLUMN */

.left-column{
  display:flex;
  flex-direction:column;
  gap:20px;
  width:260px;
}

/* SIDEBAR */

.sidebar{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.sidebar a{
  width:260px;
  padding:14px 18px;
  text-decoration:none;
  color:white;
  font-size:16px;
  font-weight:600;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 10px 25px rgba(0,0,0,0.35),
             inset 0 1px 0 rgba(255,255,255,0.08);
  transition:0.25s;
}

.sidebar a:hover{
  transform:translateX(6px) scale(1.03);
  background:linear-gradient(135deg,#5ea0ff,#7b6dff);
}

/* RIGHT SIDE */

.right-side{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* LINKS BOX */

.links-box{
  width:260px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.top-links{
  display:flex;
  gap:12px;
}

.side-btn{
  flex:1;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2f2f2f,#454545);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  transition:0.3s ease;
  box-shadow:0 0 12px rgba(255,255,255,0.08);
}

.full{
  width:100%;
}

.side-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,#444,#666);
  box-shadow:0 0 18px rgba(255,255,255,0.18);
}

/* PLAYER */

.player{
  width:260px;
  background:#0F172A;
  border:2px solid #22C55E;
  border-radius:12px;
  padding:10px;
  position:relative;
  box-shadow:0 0 25px rgba(34,197,94,0.25);
}

.live-dot{
  width:8px;
  height:8px;
  background:#22C55E;
  border-radius:50%;
  position:absolute;
  top:8px;
  left:8px;
  box-shadow:0 0 8px #22C55E;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:6px;
  color:#22C55E;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 8s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border:2px solid #1E293B;
  border-radius:8px;
  overflow:hidden;
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:8px;
}

.controls button{
  background:#1E293B;
  color:#E2E8F0;
  border:1px solid #1E293B;
  width:30px;
  height:24px;
  border-radius:7px;
  cursor:pointer;
  transition:0.25s;
}

.controls button:hover{
  transform:translateY(-2px) scale(1.05);
  border-color:#22C55E;
}

#toggleBtn{
  width:42px;
  font-size:13px;
  font-weight:bold;
  background:linear-gradient(135deg,#22C55E,#16A34A);
  border:none;
  box-shadow:0 0 12px rgba(34,197,94,0.45);
}

#toggleBtn:hover{
  transform:scale(1.08);
}

</style>
</head>

<body>

<div class="welcome">WELCOME</div>

<div class="container">

  <div class="left-column">
    <div class="sidebar">
      <a href="#">Review</a>
      <a href="#">Insight</a>
      <a href="#">Ads</a>
    </div>
  </div>

  <div class="right-side">

    <div class="links-box">

      <div class="top-links">
        <a href="#" class="side-btn">Owner</a>
        <a href="#" class="side-btn">Co Owner</a>
      </div>

      <a href="#" class="side-btn full">Club Rules</a>
      <a href="#" class="side-btn full">Announcements</a>
      <a href="#" class="side-btn full">Join Events</a>

    </div>

    <div class="player">

      <div class="live-dot"></div>

      <div class="marquee">
        <span id="songText">Now Playing:</span>
      </div>

      <div class="screen">
        <iframe id="playerFrame" allow="autoplay; fullscreen"></iframe>
      </div>

      <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="toggleBtn" onclick="toggleVideo()">▶</button>
        <button onclick="nextSong()">⏭</button>
      </div>

    </div>

  </div>

</div>

<script>

let songs = [
  {src:"https://youtu.be/kcsGhOmULxQ", name:"Golden Brown - The Stranglers"},
  {src:"https://youtu.be/_XeE2aEiPHk", name:"The Flame of Love - Rokudenashi"},
  {src:"https://youtu.be/qdpXxGPqW-Y", name:"Faded - Alan Walker"},
  {src:"https://youtu.be/k50D8-EvNxk", name:"Meu Abrigo - Melim"},
  {src:"https://youtu.be/7WoVX2X3SQw", name:"Motagem Renaido - Jmilton"}
];

let songIndex = 0;
let isPlaying = false;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");
const toggleBtn = document.getElementById("toggleBtn");

function convert(url){
  let id = url.split("youtu.be/")[1].split("?")[0];
  return "https://www.youtube.com/embed/" + id + "?enablejsapi=1&rel=0";
}

function loadVideo(i){
  frame.src = convert(songs[i].src);
  songText.innerText = "Now Playing: " + songs[i].name;
  toggleBtn.innerText = "▶";
  isPlaying = false;
}

function prevSong(){
  songIndex--;
  if(songIndex < 0) songIndex = songs.length - 1;
  loadVideo(songIndex);
}

function nextSong(){
  songIndex++;
  if(songIndex >= songs.length) songIndex = 0;
  loadVideo(songIndex);
}

function toggleVideo(){
  if(!isPlaying){
    frame.contentWindow.postMessage(
      '{"event":"command","func":"playVideo","args":""}',
      "*"
    );
    toggleBtn.innerText = "❚❚";
    isPlaying = true;
  } else {
    frame.contentWindow.postMessage(
      '{"event":"command","func":"pauseVideo","args":""}',
      "*"
    );
    toggleBtn.innerText = "▶";
    isPlaying = false;
  }
}

loadVideo(songIndex);

</script>

</body>
</html>
