<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Intro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #06142e,
        #0b2447,
        #123c69
    );
    color:white;
    padding:30px;
}

/* Section Box */
.section{
    max-width:800px;
    margin:25px auto;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(8px);
}

/* Intro Section */
.owner{
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    color:#8ecbff;
    margin-bottom:15px;
}

.profile-pic{
    width:180px;
    height:180px;
    border-radius:50%;
    display:block;
    margin:auto;
    object-fit:cover;
    border:4px solid #8ecbff;
}

.name{
    text-align:center;
    font-size:32px;
    margin-top:15px;
    font-weight:bold;
}

/* Video */
iframe{
    width:100%;
    height:400px;
    border:none;
    border-radius:15px;
}

/* Goal & Warning */
h2{
    color:#8ecbff;
    margin-bottom:10px;
}

.goal{
    margin-bottom:25px;
    line-height:1.7;
}

.warning{
    color:#ffb3b3;
    line-height:1.7;
}
</style>
</head>
<body>

<!-- Section 1 -->
<div class="section">
    <div class="owner">OWNER</div>

    <img src="your-image.jpg" alt="Profile" class="profile-pic">

    <div class="name">Your Name</div>
</div>

<!-- Section 2 -->
<div class="section">
    <iframe
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    allowfullscreen>
    </iframe>
</div>

<!-- Section 3 -->
<div class="section">
    <h2>🎯 Goal</h2>

    <div class="goal">
        Our goal is to create a strong and active community,
        help members improve their skills, and maintain a
        friendly environment for everyone.
    </div>

    <h2>⚠ Warning</h2>

    <div class="warning">
        Respect all members. Any form of abuse, spam,
        cheating, or inappropriate behavior may result
        in removal from the community.
    </div>
</div>

</body>
</html>
