<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background: radial-gradient(circle at top, #111827, #0b1220);
color:#d7e2f0;
font-family:'Poppins',sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* 🌈 RGB BORDER */
.rgbBorder{
position:fixed;
inset:0;
padding:3px;
background:linear-gradient(
90deg,
#ff4d4d,#ffb84d,#fff36a,#5cff7a,#4dd2ff,#6a7bff,#c77dff,#ff4d4d
);
background-size:400% 400%;
animation:rgbMove 8s linear infinite;
opacity:0.85;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:3px;
background:#0b1220;
}

@keyframes rgbMove{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

/* MAIN BOX */
.mainBox{
width:300px;
margin:20px auto;
padding:14px;
text-align:center;
background:#0b1220;
border-radius:12px;
border:1px solid rgba(124,255,178,0.25);
}

/* PIXEL GLOW */
.pixelGlowBox{
width:270px;
height:60px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

.pixelBorder{
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(90deg,#7CFFB2,white,#7CFFB2);
background-size:300% 300%;
animation:rgbMove 6s ease-in-out infinite;
}

.pixelBorder::before{
content:"";
position:absolute;
inset:2px;
background:#0b1220;
}

#pixelText{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:1rem;
font-family:'Orbitron',sans-serif;
font-weight:700;
letter-spacing:2px;
}
.links{
display:flex;
flex-direction:column;
gap:10px;
margin-top:12px;
}

.topRow{
display:flex;
gap:10px;
}

.linkBtn{
flex:1;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:13px;
font-weight:600;
color:#d7e2f0;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:0.2s;
}

.linkBtn:hover{
background:rgba(124,255,178,0.12);
border-color:#7CFFB2;
color:#7CFFB2;
}

.full{
width:100%;
}
/* PLAYER */
.player{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:10px;
position:relative;
}

.live-dot{
width:8px;
height:8px;
background:#7CFFB2;
border-radius:50%;
position:absolute;
top:8px;
left:8px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.marquee{
width:100%;
overflow:hidden;
white-space:nowrap;
font-size:11px;
margin-bottom:6px;
color:#7CFFB2;
}

.screen{
width:100%;
aspect-ratio:16/9;
border:1px solid rgba(124,255,178,0.25);
border-radius:8px;
overflow:hidden;
}

.screen iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.controls button{
background:rgba(255,255,255,0.05);
color:#d7e2f0;
border:1px solid rgba(255,255,255,0.08);
width:32px;
height:26px;
border-radius:7px;
cursor:pointer;
transition:0.2s;
}

.controls button:hover{
background:rgba(124,255,178,0.15);
border-color:#7CFFB2;
color:#7CFFB2;
}

#toggleBtn{
background:#7CFFB2;
color:#0b1220;
font-weight:bold;
}

/* CALENDAR */
.box{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:12px;
}

.title{
text-align:center;
font-weight:700;
color:#7CFFB2;
font-size:16px;
}

.subtitle{
text-align:center;
font-size:11px;
opacity:0.7;
margin-top:3px;
}

.days, .calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
margin-top:10px;
}

.days div{
font-size:10px;
opacity:0.6;
}

.calendar div{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.03);
border-radius:10px;
font-size:12px;
transition:0.2s;
cursor:pointer;
}

.calendar div:hover{
background:rgba(124,255,178,0.15);
transform:scale(1.05);
}

.today{
background:#7CFFB2 !important;
color:#0b1220;
font-weight:bold;
}

/* NAV */
.buttons{
display:flex;
gap:8px;
margin-top:12px;
}

.btn{
flex:1;
text-align:center;
padding:6px;
border-radius:8px;
font-size:11px;
text-decoration:none;
background:rgba(255,255,255,0.05);
color:#d7e2f0;
border:1px solid rgba(255,255,255,0.08);
}

.btn:hover{
background:rgba(124,255,178,0.15);
color:#7CFFB2;
border-color:#7CFFB2;
}

/* PARTNERS (ADDED - SAME THEME) */
.section{
width:270px;
margin:20px auto;
background:#0b1220;
border:1px solid rgba(124,255,178,0.35);
border-radius:12px;
padding:12px;
}

.section-title{
text-align:center;
color:#7CFFB2;
font-weight:bold;
margin-bottom:10px;
font-size:14px;
}

.partner-card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
padding:12px;
text-align:center;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
}

.partner-card:hover{
transform:scale(1.03);
border-color:#7CFFB2;
}

.partner-img{
width:65px;
height:65px;
border-radius:10px;
object-fit:cover;
}

.partner-name{
margin-top:6px;
font-size:13px;
color:#d7e2f0;
}
</style>
</head>

<body>

target="_blank">

</div>
<div class="player">

<div class="live-dot"></div>
<div class="marquee"><span id="songText">Now Playing</span></div>

<div class="screen">
<iframe id="playerFrame" allow="autoplay; encrypted-media; fullscreen"></iframe>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>

<div class="subtitle">◌⑅⃝ᵐᶦˢˢ(꜆˘͈ෆ˘͈꜀)ʸᵒᵘ⑅⃝◌</div>

<div class="days">

<div></div><div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>

href="https://chessinsights.xyz/"
target="_blank">

</div>
</div>

<div class="section">

<div class="section-title">◆ PARTNERS ◆</div>

</div>

<script>
let songs=[

},  
 {

name:"Motagem Renaido - Jmilton"
}, 
{

name:"A Walk - Tycho"  
},

name:"Passo Bem Solto - ATLXS"  
},

},

name:"Monody - TheFatRat"  
}, {src:"https://youtu.be/4jh2H5qFb44", name:"Shape of You - Ed Sheeran"},
  {src:"https://youtu.be/rfTgO9rpqck", name:"Heat Waves - Glass Animals"},
  {src:"https://youtu.be/JrNMyzsYr4M", name:"Love Me Like You Do - Ellie Goulding"},
  {src:"https://youtu.be/DKbfBSrjVHA", name:"Can We Kiss Forever? - Kina"},

  {src:"https://youtu.be/7U1LFCY70nA", name:"Ava - Underdog"}

];  
let i=0;
let isPlaying=false;

const frame=document.getElementById("playerFrame");
const songText=document.getElementById("songText");
const btn=document.getElementById("toggleBtn");

function getId(url){
if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
if(url.includes("watch?v=")) return url.split("watch?v=")[1].split("&")[0];
return url;
}

function convert(url){
return `https://www.youtube.com/embed/${getId(url)}?enablejsapi=1&rel=0`;
}

function load(){
frame.src=convert(songs[i].src);
songText.innerText="Now Playing: "+songs[i].name;
btn.innerText="▶";
isPlaying=false;
}

function nextSong(){i=(i+1)%songs.length;load();}
function prevSong(){i=(i-1+songs.length)%songs.length;load();}

function toggleVideo(){
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:isPlaying?"pauseVideo":"playVideo",
args:[]
}),"*");

isPlaying=!isPlaying;
btn.innerText=isPlaying?"❚❚":"▶";
}

load();

/* PARTNERS */
const partners=[
{name:"SAPPHIRE",img:"https://i.ibb.co/4RYLGQ3z/image.jpg",link:"https://www.chess.com/club/sapphire-1"},
{name:"PENGUIN CHESS CLUB",img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",link:"https://www.chess.com/club/penguin-chess-club-3"}
];

const container=document.getElementById("partnersContainer");

partners.forEach(p=>{
const card=document.createElement("div");
card.className="partner-card";

card.innerHTML=`
<img src="${p.img}" class="partner-img">
<div class="partner-name">${p.name}</div>
`;

card.onclick=()=>window.open(p.link,"_blank");

container.appendChild(card);
});
</script>
