<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Links + Image Box</title>

<style>

body{
  margin:0;
  background:#0b1220;
  font-family:Arial, sans-serif;
  padding:25px;
  color:white;
}

/* MAIN BOX */
.box{
  max-width:800px;
  margin:auto;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;

  padding:20px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

/* LEFT SIDE */
.left{
  width:55%;
}

.left-title{
  font-weight:bold;
  margin-bottom:12px;
  font-size:18px;
}

.left a{
  display:block;
  margin:8px 0;
  padding:12px;
  text-decoration:none;
  color:white;

  background:rgba(255,255,255,0.08);
  border-radius:12px;
  text-align:center;
}

/* RIGHT SIDE */
.right{
  width:40%;
  text-align:center;
}

.right-title{
  font-weight:bold;
  margin-bottom:12px;
  font-size:18px;
}

.right img{
  width:100%;
  border-radius:16px;
}

/* MOBILE */
@media(max-width:650px){
  .box{
    flex-direction:column;
  }
  .left,.right{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="box">

  <!-- LEFT -->
  <div class="left">
    <div class="left-title">These are links</div>

    <a href="#">Club Rules</a>
    <a href="#">Announcement</a>
    <a href="#">Join Events</a>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-title">This is image</div>

    <img src="https://i.ibb.co/8L4mGQ7/image.png" alt="Image">
  </div>

</div>

</body>
</html>
