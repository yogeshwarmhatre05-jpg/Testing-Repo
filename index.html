<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Left Links Right Image</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1220;
  font-family:Poppins,sans-serif;
  padding:25px;
  color:white;
}

.container{
  max-width:750px;
  margin:auto;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:25px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:20px;
}

/* LEFT LINKS */
.links{
  width:55%;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.links a{
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:600;
  transition:0.3s;
}

.links a:hover{
  background:rgba(255,255,255,0.14);
  transform:translateY(-3px);
}

/* RIGHT IMAGE */
.image{
  width:40%;
}

.image img{
  width:100%;
  border-radius:16px;
  display:block;
}

@media(max-width:650px){
  .container{
    flex-direction:column;
  }

  .links, .image{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT LINKS -->
  <div class="links">
    <a href="#">Club Rules</a>
    <a href="#">Announcement</a>
    <a href="#">Join Events</a>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="image">
    <img src="https://i.ibb.co/8L4mGQ7/image.png" alt="Club Image">
  </div>

</div>

</body>
</html>
