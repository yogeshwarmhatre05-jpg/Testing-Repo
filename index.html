<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top left,#1e293b 0%,transparent 35%),
radial-gradient(circle at bottom right,#0f766e33 0%,transparent 30%),
linear-gradient(135deg,#020617,#0f172a,#111827);
font-family:'Inter',sans-serif;
color:#e2e8f0;
min-height:100vh;
overflow-x:hidden;
padding:20px 0;
}

/* RGB BORDER */
.rgbBorder{
position:fixed;
inset:0;
padding:2px;
background:linear-gradient(
90deg,
#60a5fa,
#38bdf8,
#818cf8,
#60a5fa
);
background-size:300% 300%;
animation:borderMove 8s linear infinite;
z-index:-1;
}

.rgbBorder::before{
content:"";
position:absolute;
inset:2px;
background:#020617;
}

@keyframes borderMove{
0%{background-position:0% 50%;}
100%{background-position:300% 50%;}
}

/* MAIN */
.mainBox{
width:320px;
margin:auto;
padding:18px;
background:rgba(15,23,42,0.88);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,0.45);
}

/* LOGO */
.pixelGlowBox{
width:280px;
height:70px;
margin:auto;
position:relative;
overflow:hidden;
border-radius:18px;
}

.pixelBorder{
position:absolute;
inset:0;
padding:2px;
background:linear-gradient(
135deg,
#60a5fa,
#38bdf8,
#818cf8
);
background-size:300% 300%;
animation:borderMove 6s linear infinite;
}

.pixelBorder::before{
content:"";
position:absolute;
inset:2px;
background:#0f172a;
border-radius:16px;
}

#pixelText{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-family:'Space Grotesk',sans-serif;
font-size:1.1rem;
font-weight:700;
letter-spacing:3px;
color:white;
text-shadow:0 0 15px rgba(96,165,250,0.5);
}

/* MARQUEE */
.marqueeWrap{
overflow:hidden;
margin-top:12px;
color:#7dd3fc;
font-size:12px;
}

/* IMAGE */
.mainImg{
width:250px;
display:block;
margin:14px auto;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* QUOTE */
.quote{
display:block;
text-align:center;
font-size:14px;
line-height:1.6;
color:#dbeafe;
margin-top:6px;
}

/* LINKS */
.links{
display:flex;
flex-direction:column;
gap:10px;
margin-top:18px;
}

.topRow{
display:flex;
gap:10px;
}

.linkBtn{
flex:1;
padding:11px;
border-radius:14px;
text-decoration:none;
text-align:center;
font-size:13px;
font-weight:600;
color:#e2e8f0;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
}

.linkBtn:hover{
background:rgba(96,165,250,0.12);
border-color:#60a5fa;
transform:translateY(-2px);
}

.full{
width:100%;
}

/* PLAYER */
.player,
.box,
.section{
width:280px;
margin:22px auto;
padding:14px;
border-radius:20px;
background:rgba(17,24,39,0.92);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.live-dot{
width:9px;
height:9px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 10px #22c55e;
animation:pulse 1.5s infinite;
margin-bottom:8px;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

.marquee{
overflow:hidden;
white-space:nowrap;
font-size:11px;
color:#7dd3fc;
margin-bottom:8px;
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
background:black;
}

.screen iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.controls button{
width:36px;
height:30px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.06);
color:white;
cursor:pointer;
transition:0.25s;
}

.controls button:hover{
background:rgba(96,165,250,0.15);
}

#toggleBtn{
background:linear-gradient(135deg,#60a5fa,#38bdf8);
color:#08111f;
font-weight:bold;
}

/* TITLES */
.title,
.section-title{
text-align:center;
font-size:15px;
font-weight:700;
margin-bottom:5px;
color:#dbeafe;
}

.subtitle{
text-align:center;
font-size:11px;
color:#94a3b8;
margin-bottom:10px;
}

/* CALENDAR */
.days,
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
text-align:center;
}

.days div{
font-size:10px;
color:#94a3b8;
}

.calendar div{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.03);
border-radius:12px;
font-size:12px;
transition:0.25s;
}

.calendar div:hover{
background:rgba(96,165,250,0.12);
transform:translateY(-2px);
}

.today{
background:linear-gradient(135deg,#60a5fa,#38bdf8) !important;
color:#08111f;
font-weight:bold;
}

/* BUTTONS */
.buttons{
display:flex;
gap:8px;
margin-top:14px;
}

.btn{
flex:1;
padding:8px;
border-radius:12px;
text-decoration:none;
text-align:center;
font-size:11px;
font-weight:600;
color:#e2e8f0;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
}

.btn:hover{
background:rgba(96,165,250,0.12);
border-color:#60a5fa;
}

/* PARTNERS */
.partner-card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:12px;
text-align:center;
margin-bottom:10px;
cursor:pointer;
transition:0.25s;
}

.partner-card:hover{
background:rgba(96,165,250,0.08);
border-color:#60a5fa;
transform:translateY(-2px);
}

.partner-img{
width:68px;
height:68px;
border-radius:14px;
object-fit:cover;
}

.partner-name{
margin-top:8px;
font-size:13px;
font-weight:600;
}
</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

<div class="pixelGlowBox">
<div class="pixelBorder"></div>
<div id="pixelText">PIXEL GLOW</div>
</div>

<div class="marqueeWrap">
<marquee scrollamount="3">
♣︎ Welcome to Our Club ♣︎
</marquee>
</div>

<img class="mainImg" src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png">

<i class="quote">
"Even a pawn becomes powerful when it keeps moving forward"
</i>

<div class="links">

<div class="topRow">

<a class="linkBtn"
href="https://www.chess.com/member/yogi136"
target="_blank">
Owner
</a>

<a class="linkBtn"
href="https://www.chess.com/member/michael-kaiser10bm"
target="_blank">
Co Owner
</a>

</div>

<a class="linkBtn full"
href="https://www.chess.com/clubs/forum/view/club-rulebook-1#comment-127196376"
target="_blank">
Club Rules
</a>

<a class="linkBtn full"
href="https://www.chess.com/club/pixelglow/announcements"
target="_blank">
Announcements
</a>

<a class="linkBtn full"
href="https://www.chess.com/clubs/events/pixelglow"
target="_blank">
Join Events
</a>

</div>

</div>

</body>
</html>
