<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Calendar Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0a0f1f;
  --bg2:#0f1b33;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);
  --text:#eaf0ff;
  --muted:#9aa7c7;
  --accent:#6ae4ff;
  --accent2:#b46bff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top, #162447, var(--bg1));
  color:var(--text);
}

/* MAIN CARD */
.container{
  width:380px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  backdrop-filter: blur(16px);
  padding:18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.header h1{
  font-size:18px;
  font-weight:700;
}

.header span{
  font-size:12px;
  color:var(--muted);
}

/* CALENDAR GRID */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  text-align:center;
  font-size:11px;
  color:var(--muted);
  padding:6px 0;
}

.date{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid transparent;
  font-size:13px;
  transition:0.25s;
  cursor:pointer;
}

.date:hover{
  border:1px solid var(--accent);
  background:rgba(106,228,255,0.12);
  transform:translateY(-2px);
}

/* HIGHLIGHT TODAY (example) */
.today{
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  color:#0a0f1f;
  font-weight:700;
}

/* BUTTON SECTION */
.buttons{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn{
  flex:1;
  padding:10px;
  text-align:center;
  text-decoration:none;
  border-radius:12px;
  font-weight:600;
  font-size:13px;
  color:white;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  transition:0.25s;
}

.btn:hover{
  border-color:var(--accent);
  box-shadow:0 0 18px rgba(106,228,255,0.25);
  transform:translateY(-2px);
}

/* SUB TITLE */
.sub{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>
      <h1>Calendar</h1>
      <div class="sub">Minimal • Clean • Dashboard UI</div>
    </div>
    <span>May 2026</span>
  </div>

  <!-- Days -->
  <div class="calendar">
    <div class="day">S</div>
    <div class="day">M</div>
    <div class="day">T</div>
    <div class="day">W</div>
    <div class="day">T</div>
    <div class="day">F</div>
    <div class="day">S</div>

    <div class="date"></div>
    <div class="date"></div>
    <div class="date">1</div>
    <div class="date">2</div>
    <div class="date">3</div>
    <div class="date">4</div>
    <div class="date">5</div>

    <div class="date">6</div>
    <div class="date">7</div>
    <div class="date">8</div>
    <div class="date">9</div>
    <div class="date">10</div>
    <div class="date">11</div>
    <div class="date">12</div>

    <div class="date">13</div>
    <div class="date">14</div>
    <div class="date">15</div>
    <div class="date">16</div>
    <div class="date">17</div>
    <div class="date">18</div>
    <div class="date">19</div>

    <div class="date">20</div>
    <div class="date">21</div>
    <div class="date today">22</div>
    <div class="date">23</div>
    <div class="date">24</div>
    <div class="date">25</div>
    <div class="date">26</div>

    <div class="date">27</div>
    <div class="date">28</div>
    <div class="date">29</div>
    <div class="date">30</div>
    <div class="date">31</div>
    <div class="date"></div>
    <div class="date"></div>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <a class="btn" href="#">Dashboard</a>
    <a class="btn" href="#">Tasks</a>
    <a class="btn" href="#">Settings</a>
  </div>

</div>

</body>
</html>
