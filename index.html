<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
}

/* MAIN BOX */
.links-box{
  width:320px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* TOP ROW */
.top-links{
  display:flex;
  gap:12px;
}

/* BUTTON STYLE */
.side-btn{
  flex:1;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2f2f2f,#454545);
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  transition:0.3s ease;
  box-shadow:0 0 12px rgba(255,255,255,0.08);
}

/* FULL WIDTH BUTTONS */
.full{
  width:100%;
}

/* HOVER EFFECT */
.side-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,#444,#666);
  box-shadow:0 0 18px rgba(255,255,255,0.18);
}

</style>
</head>
<body>

<div class="links-box">

  <!-- TOP BUTTONS -->
  <div class="top-links">
    <a href="#" class="side-btn">Owner</a>
    <a href="#" class="side-btn">Co Owner</a>
  </div>

  <!-- MAIN BUTTONS -->
  <a href="#" class="side-btn full">Club Rules</a>
  <a href="#" class="side-btn full">Announcements</a>
  <a href="#" class="side-btn full">Join Events</a>

</div>

</body>
</html>
