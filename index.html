<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cute Calendar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#ffe6f0;
  --bg2:#e6f7ff;
  --card:#ffffffcc;
  --text:#3a3a3a;
  --accent:#ff7eb9;
  --accent2:#7afcff;
  --soft:#fff3f8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* CARD */
.box{
  width:360px;
  background:var(--card);
  border-radius:22px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  backdrop-filter: blur(10px);
}

/* HEADER */
.title{
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}

.subtitle{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:4px;
}

/* DAYS */
.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  margin-top:14px;
  text-align:center;
  font-size:11px;
  color:#aaa;
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.date{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  background:#fff;
  font-size:13px;
  color:var(--text);
  transition:0.2s;
  border:1px solid #f1f1f1;
  cursor:pointer;
}

.date:hover{
  background:var(--soft);
  transform:scale(1.08);
  border-color:var(--accent);
}

/* cute today highlight */
.today{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:700;
  box-shadow:0 6px 15px rgba(255,126,185,0.3);
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:10px;
  border-radius:14px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  font-size:13px;
  background:#fff;
  color:var(--text);
  border:1px solid #eee;
  transition:0.2s;
}

.btn:hover{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(255,126,185,0.25);
}
</style>
</head>

<body>

<div class="box">

  <div class="title">🌷 My Cute Calendar</div>
  <div class="subtitle">soft vibes • pastel style</div>

  <div class="days">
    <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
  </div>

  <div class="calendar">
    <div class="date"></div>
    <div class="date"></div>
    <div class="date">1</div>
    <div class="date">2</div>
    <div class="date">3</div>
    <div class="date">4</div>
    <div class="date">5</div>

    <div class="date">6</div>
    <div class="date">7</div>
    <div class="date">8</div>
    <div class="date">9</div>
    <div class="date">10</div>
    <div class="date">11</div>
    <div class="date">12</div>

    <div class="date">13</div>
    <div class="date">14</div>
    <div class="date">15</div>
    <div class="date">16</div>
    <div class="date">17</div>
    <div class="date">18</div>
    <div class="date">19</div>

    <div class="date">20</div>
    <div class="date">21</div>
    <div class="date today">22</div>
    <div class="date">23</div>
    <div class="date">24</div>
    <div class="date">25</div>
    <div class="date">26</div>

    <div class="date">27</div>
    <div class="date">28</div>
    <div class="date">29</div>
    <div class="date">30</div>
    <div class="date">31</div>
    <div class="date"></div>
    <div class="date"></div>
  </div>

  <div class="buttons">
    <a class="btn" href="#">Home</a>
    <a class="btn" href="#">Notes</a>
    <a class="btn" href="#">Profile</a>
  </div>

</div>

</body>
</html>
