<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;

  background:
  radial-gradient(circle at top,#1E293B,#0F172A 70%);

  font-family:'Poppins',sans-serif;
}

/* SAME SIZE FOR ALL BOXES */

.sidebar,
.calendar,
.links-box,
.player{
  width:260px;
  height:300px;
}

/* SIDEBAR */

.sidebar{
  display:flex;
  flex-direction:column;
  gap:14px;

  background:rgba(30,41,59,0.7);
  border:1px solid rgba(167,139,250,0.25);
  border-radius:24px;
  padding:18px;

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 30px rgba(167,139,250,0.12),
  0 0 18px rgba(103,232,249,0.08);
}

.sidebar a{
  flex:1;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  color:#E2E8F0;

  font-size:15px;
  font-weight:600;

  border-radius:18px;

  background:
  linear-gradient(135deg,#1E293B,#0F172A);

  border:1px solid rgba(249,168,212,0.18);

  transition:0.25s;

  box-shadow:
  0 0 14px rgba(167,139,250,0.08);
}

.sidebar a:hover{
  transform:translateY(-3px);

  background:
  linear-gradient(135deg,#A78BFA,#67E8F9);

  color:#0F172A;

  box-shadow:
  0 0 24px rgba(103,232,249,0.35);
}

/* CALENDAR */

.calendar{
  overflow:hidden;
  position:relative;

  border-radius:28px;

  background:rgba(30,41,59,0.72);

  backdrop-filter:blur(14px);

  border:1px solid rgba(167,139,250,0.2);

  box-shadow:
  0 0 35px rgba(167,139,250,0.14);
}

.top{
  width:100%;
  height:90px;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(135deg,#A78BFA,#67E8F9);
}

.month{
  color:#0F172A;

  font-size:28px;
  font-weight:700;
  letter-spacing:2px;
}

.content{
  height:calc(100% - 90px);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.date{
  font-size:90px;
  font-weight:700;

  color:#E2E8F0;

  text-shadow:
  0 0 18px rgba(167,139,250,0.25);
}

.year{
  margin-top:10px;

  color:#94A3B8;

  letter-spacing:4px;
  font-size:15px;
}

/* LINKS BOX */

.links-box{
  display:flex;
  flex-direction:column;
  gap:14px;

  padding:18px;

  border-radius:24px;

  background:rgba(30,41,59,0.72);

  border:1px solid rgba(167,139,250,0.22);

  backdrop-filter:blur(14px);

  box-shadow:
  0 0 30px rgba(249,168,212,0.12);
}

.top-links{
  display:flex;
  gap:12px;
}

.side-btn{
  flex:1;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  color:#E2E8F0;

  background:
  linear-gradient(135deg,#1E293B,#0F172A);

  border:1px solid rgba(103,232,249,0.16);

  border-radius:16px;

  font-size:14px;
  font-weight:600;

  transition:0.25s;

  box-shadow:
  0 0 14px rgba(103,232,249,0.08);
}

.full{
  flex:1;
}

.side-btn:hover{
  transform:translateY(-2px);

  background:
  linear-gradient(135deg,#A78BFA,#F9A8D4);

  color:#0F172A;

  box-shadow:
  0 0 22px rgba(249,168,212,0.28);
}

/* PLAYER */

.player{
  padding:14px;

  position:relative;

  border-radius:24px;

  background:rgba(30,41,59,0.72);

  border:1px solid rgba(103,232,249,0.2);

  backdrop-filter:blur(14px);

  box-shadow:
  0 0 30px rgba(103,232,249,0.14);

  display:flex;
  flex-direction:column;
}

.live-dot{
  width:8px;
  height:8px;

  background:#F9A8D4;

  border-radius:50%;

  position:absolute;
  top:10px;
  left:10px;

  box-shadow:
  0 0 12px #F9A8D4;
}

.marquee{
  overflow:hidden;
  white-space:nowrap;

  color:#67E8F9;

  font-size:11px;

  margin-bottom:10px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;

  animation:scroll 8s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  flex:1;

  border-radius:16px;
  overflow:hidden;

  border:1px solid rgba(167,139,250,0.2);
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;

  margin-top:12px;
}

.controls button{
  width:36px;
  height:30px;

  border:none;
  border-radius:10px;

  cursor:pointer;

  color:#E2E8F0;

  background:
  linear-gradient(135deg,#1E293B,#0F172A);

  transition:0.25s;
}

.controls button:hover{
  transform:translateY(-2px);

  background:
  linear-gradient(135deg,#A78BFA,#67E8F9);

  color:#0F172A;
}

#toggleBtn{
  width:48px;

  background:
  linear-gradient(135deg,#F9A8D4,#A78BFA);

  color:#0F172A;

  font-weight:700;
}
</style>
</head>

<body>

<!-- LEFT BUTTONS -->

<div class="sidebar">

  <a href="https://example.com/review" target="_blank">
    Review
  </a>

  <a href="https://example.com/insight" target="_blank">
    Insight
  </a>

  <a href="https://example.com/ads" target="_blank">
    Ads
  </a>

</div>

<!-- CALENDAR -->

<div class="calendar">

  <div class="top">
    <div class="month" id="month"></div>
  </div>

  <div class="content">
    <div class="date" id="date"></div>
    <div class="year" id="year"></div>
  </div>

</div>

<!-- LINKS BOX -->

<div class="links-box">

  <div class="top-links">
    <a href="#" class="side-btn">Owner</a>
    <a href="#" class="side-btn">Co Owner</a>
  </div>

  <a href="#" class="side-btn full">Club Rules</a>
  <a href="#" class="side-btn full">Announcements</a>
  <a href="#" class="side-btn full">Join Events</a>

</div>

<!-- PLAYER -->

<div class="player">

  <div class="live-dot"></div>

  <div class="marquee">
    <span id="songText">Now Playing:</span>
  </div>

  <div class="screen">
    <iframe
      id="playerFrame"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <div class="controls">

    <button onclick="prevSong()">⏮</button>

    <button id="toggleBtn" onclick="toggleVideo()">▶</button>

    <button onclick="nextSong()">⏭</button>

  </div>

</div>

<script>

const today = new Date();

const months = [
  "JAN","FEB","MAR","APR",
  "MAY","JUN","JUL","AUG",
  "SEP","OCT","NOV","DEC"
];

document.getElementById("month").innerText =
months[today.getMonth()];

document.getElementById("date").innerText =
today.getDate();

document.getElementById("year").innerText =
today.getFullYear();

let songs = [

{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown - The Stranglers"
},

{
src:"https://youtu.be/_XeE2aEiPHk",
name:"The Flame of Love - Rokudenashi"
},

{
src:"https://youtu.be/qdpXxGPqW-Y",
name:"Faded - Alan Walker"
},

{
src:"https://youtu.be/k50D8-EvNxk",
name:"Meu Abrigo - Melim"
},

{
src:"https://youtu.be/7WoVX2X3SQw",
name:"Motagem Renaido - Jmilton"
}

];

let songIndex = 0;
let isPlaying = false;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");
const toggleBtn = document.getElementById("toggleBtn");

function convert(url){

  if(url.includes("youtu.be")){

    let id = url.split("youtu.be/")[1].split("?")[0];

    return "https://www.youtube.com/embed/" +
    id +
    "?enablejsapi=1&rel=0";

  }

  return url;

}

function loadVideo(i){

  frame.src = convert(songs[i].src);

  songText.innerText =
  "Now Playing: " + songs[i].name;

  toggleBtn.innerText = "▶";

  isPlaying = false;

}

function prevSong(){

  songIndex--;

  if(songIndex < 0){

    songIndex = songs.length - 1;

  }

  loadVideo(songIndex);

}

function nextSong(){

  songIndex++;

  if(songIndex >= songs.length){

    songIndex = 0;

  }

  loadVideo(songIndex);

}

function toggleVideo(){

  if(!isPlaying){

    frame.contentWindow.postMessage(
      '{"event":"command","func":"playVideo","args":""}',
      "*"
    );

    toggleBtn.innerText = "❚❚";

    isPlaying = true;

  }

  else{

    frame.contentWindow.postMessage(
      '{"event":"command","func":"pauseVideo","args":""}',
      "*"
    );

    toggleBtn.innerText = "▶";

    isPlaying = false;

  }

}

loadVideo(songIndex);

</script>

</body>
</html>
