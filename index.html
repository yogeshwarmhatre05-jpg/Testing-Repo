<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Sidebar Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
background:radial-gradient(circle at top,#1f2f57,#090d18 65%);
font-family:'Poppins',sans-serif;
padding:20px;
}

.main-layout{
display:flex;
gap:20px;
align-items:flex-start;
}

/* RIGHT SIDE */
.right-side{
display:flex;
flex-direction:column;
gap:20px;
}

/* === COMBINED CALENDAR + LINKS BOX === */
.side-panel{
width:260px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
overflow:hidden;
backdrop-filter:blur(14px);
box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

/* CALENDAR TOP */
.calendar{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.top{
width:100%;
height:90px;
background:linear-gradient(135deg,#5ea0ff,#7b6dff);
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.month{
color:white;
font-size:28px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
}

.content{
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.date{
font-size:96px;
font-weight:700;
color:white;
line-height:1;
}

.year{
margin-top:10px;
font-size:16px;
letter-spacing:4px;
color:rgba(255,255,255,0.65);
}

/* LINKS INSIDE SAME BOX */
.sidebar{
display:flex;
flex-direction:column;
gap:12px;
padding:15px;
border-top:1px solid rgba(255,255,255,0.15);
}

.sidebar a{
text-decoration:none;
color:white;
font-size:16px;
font-weight:600;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.08);
transition:0.25s;
text-align:center;
}

.sidebar a:hover{
transform:translateX(4px);
background:linear-gradient(135deg,#5ea0ff,#7b6dff);
}

/* LINKS BOX (OTHER BUTTONS) */
.links-box{
width:260px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
padding:18px;
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
gap:14px;
}

.top-links{
display:flex;
gap:12px;
}

.side-btn{
flex:1;
text-decoration:none;
color:white;
background:linear-gradient(135deg,#2f2f2f,#454545);
padding:14px;
border-radius:14px;
text-align:center;
font-size:15px;
font-weight:600;
transition:0.3s ease;
}

.side-btn:hover{
transform:translateY(-2px);
background:linear-gradient(135deg,#444,#666);
}

/* PLAYER */
.player{
width:260px;
background:#0F172A;
border:2px solid #22C55E;
border-radius:12px;
padding:10px;
box-shadow:0 0 25px rgba(34,197,94,0.25);
}

.live-dot{
width:8px;height:8px;
background:#22C55E;
border-radius:50%;
position:absolute;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

.marquee{
width:100%;
overflow:hidden;
white-space:nowrap;
font-size:11px;
margin-bottom:6px;
color:#22C55E;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.screen iframe{
width:100%;
aspect-ratio:16/9;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="main-layout">

<!-- LEFT CALENDAR + LINKS COMBINED -->
<div class="side-panel">

<div class="calendar">
  <div class="top">
    <div class="month" id="month"></div>
  </div>

  <div class="content">
    <div class="date" id="date"></div>
    <div class="year" id="year"></div>
  </div>
</div>

<div class="sidebar">
  <a href="#">Review</a>
  <a href="#">Insight</a>
  <a href="#">Ads</a>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="right-side">

<div class="links-box">
  <div class="top-links">
    <a href="#" class="side-btn">Owner</a>
    <a href="#" class="side-btn">Co Owner</a>
  </div>
  <a href="#" class="side-btn">Club Rules</a>
  <a href="#" class="side-btn">Announcements</a>
  <a href="#" class="side-btn">Join Events</a>
</div>

</div>

</div>

<script>
const today = new Date();
const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

document.getElementById("month").innerText = months[today.getMonth()];
document.getElementById("date").innerText = today.getDate();
document.getElementById("year").innerText = today.getFullYear();
</script>

</body>
</html>
