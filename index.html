<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top, #111827, #0b1220);
color:#d7e2f0;
display:flex;
justify-content:center;
padding:20px;
}

/* MAIN BOX */
.mainBox{
width:320px;
display:flex;
flex-direction:column;
gap:14px;
}

/* HEADER */
.header{
text-align:center;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(124,255,178,0.25);
}

.header h1{
font-family:'Orbitron',sans-serif;
font-size:18px;
color:#7CFFB2;
}

.header p{
font-size:11px;
opacity:0.6;
}

/* SIDEBAR */
.sidebar{
display:flex;
flex-direction:column;
gap:10px;
}

.top-links{
display:flex;
gap:10px;
}

.btn{
flex:1;
text-align:center;
padding:10px;
border-radius:12px;
text-decoration:none;
font-weight:600;
font-size:13px;
color:#d7e2f0;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:0.2s;
}

.btn:hover{
background:rgba(124,255,178,0.12);
border-color:#7CFFB2;
color:#7CFFB2;
}

.full{
width:100%;
}

/* IMAGE */
.hero{
border-radius:14px;
overflow:hidden;
border:1px solid rgba(124,255,178,0.25);
}

.hero img{
width:100%;
display:block;
}

/* PLAYER */
.player{
background:rgba(255,255,255,0.03);
border:1px solid rgba(124,255,178,0.25);
border-radius:14px;
padding:12px;
}

.live{
display:flex;
align-items:center;
gap:6px;
font-size:11px;
color:#7CFFB2;
margin-bottom:8px;
}

.dot{
width:7px;
height:7px;
background:#7CFFB2;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:10px;
overflow:hidden;
border:1px solid rgba(124,255,178,0.2);
}

iframe{
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
padding:6px 10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.04);
color:#d7e2f0;
cursor:pointer;
}

#toggleBtn{
background:#7CFFB2;
color:#0b1220;
font-weight:600;
}

/* CALENDAR */
.calendar{
background:rgba(255,255,255,0.03);
border:1px solid rgba(124,255,178,0.25);
border-radius:14px;
padding:12px;
}

.title{
text-align:center;
color:#7CFFB2;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
font-size:11px;
}

.day{
opacity:0.5;
}

.date{
padding:6px 0;
border-radius:8px;
background:rgba(255,255,255,0.03);
}

.today{
background:#7CFFB2;
color:#0b1220;
font-weight:600;
}

/* ================= PARTNERS ================= */

.section{
border:1px solid rgba(124,255,178,0.25);
border-radius:14px;
padding:12px;
background:rgba(255,255,255,0.03);
}

.section-title{
text-align:center;
color:#7CFFB2;
font-weight:bold;
margin-bottom:10px;
}

.partner-card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
padding:12px;
text-align:center;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
}

.partner-card:hover{
transform:scale(1.03);
border-color:#7CFFB2;
}

.partner-img{
width:65px;
height:65px;
border-radius:10px;
object-fit:cover;
}

.partner-name{
margin-top:6px;
font-size:13px;
}
</style>
</head>

<body>

<div class="mainBox">

<!-- HEADER -->
<div class="header">
<h1>PIXEL GLOW CLUB</h1>
<p>nostalgic minimal space</p>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="top-links">
<a class="btn">Owner</a>
<a class="btn">Co Owner</a>
</div>

<a class="btn full">Club Rules</a>
<a class="btn full">Announcements</a>
<a class="btn full">Join Events</a>

</div>

<!-- IMAGE -->
<div class="hero">
<img src="https://i.ibb.co/wNJ7ppRK/dffee40173146e6ecec0ebc503391970-1.png">
</div>

<!-- PLAYER -->
<div class="player">

<div class="live">
<div class="dot"></div>
<span id="songText">Now Playing</span>
</div>

<div class="screen">
<iframe id="playerFrame"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen></iframe>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button id="toggleBtn" onclick="toggleVideo()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<!-- CALENDAR -->
<div class="calendar">

<div class="title">May 2026</div>

<div class="grid">
<div class="day">S</div><div class="day">M</div><div class="day">T</div><div class="day">W</div><div class="day">T</div><div class="day">F</div><div class="day">S</div>

<div></div><div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
<div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div>
<div>13</div><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div><div>19</div>
<div>20</div><div>21</div><div class="today">22</div><div>23</div><div>24</div><div>25</div><div>26</div>
<div>27</div><div>28</div><div>29</div><div>30</div><div>31</div>
</div>

</div>

<!-- PARTNERS (ADDED BELOW CALENDAR) -->
<div class="section">

<div class="section-title">◆ PARTNERS ◆</div>

<div id="partnersContainer"></div>

</div>

</div>

<script>
let songs=[
{src:"https://youtu.be/kcsGhOmULxQ",name:"Golden Brown"},
{src:"https://youtu.be/_XeE2aEiPHk",name:"Flame of Love"},
{src:"https://youtu.be/qdpXxGPqW-Y",name:"Faded"}
];

let i=0;
let isPlaying=false;

const frame=document.getElementById("playerFrame");
const songText=document.getElementById("songText");
const btn=document.getElementById("toggleBtn");

function getId(url){
if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
if(url.includes("watch?v=")) return url.split("watch?v=")[1].split("&")[0];
return url;
}

function convert(url){
return `https://www.youtube.com/embed/${getId(url)}?enablejsapi=1&rel=0`;
}

function load(){
frame.src=convert(songs[i].src);
songText.innerText="Now Playing: "+songs[i].name;
btn.innerText="▶";
isPlaying=false;
}

function nextSong(){i=(i+1)%songs.length;load();}
function prevSong(){i=(i-1+songs.length)%songs.length;load();}

function toggleVideo(){
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:isPlaying?"pauseVideo":"playVideo",
args:[]
}),"*");

isPlaying=!isPlaying;
btn.innerText=isPlaying?"❚❚":"▶";
}

load();

/* PARTNERS */
const partners=[
{name:"SAPPHIRE",img:"https://i.ibb.co/4RYLGQ3z/image.jpg",link:"https://www.chess.com/club/sapphire-1"},
{name:"PENGUIN CHESS CLUB",img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",link:"https://www.chess.com/club/penguin-chess-club-3"}
];

const container=document.getElementById("partnersContainer");

partners.forEach(p=>{
const card=document.createElement("div");
card.className="partner-card";

card.innerHTML=`
<img src="${p.img}" class="partner-img">
<div class="partner-name">${p.name}</div>
`;

card.onclick=()=>window.open(p.link,"_blank");

container.appendChild(card);
});
</script>

</body>
</html>
