<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0b0f19;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* main container */
.chat-container {
  width: 400px;
  height: 600px;
  background: #111827;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid #2a2f3a;
}

/* header */
.header {
  padding: 15px;
  background: #0f172a;
  color: white;
  font-weight: bold;
  text-align: center;
}

/* chat box */
.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* messages */
.message {
  padding: 10px 12px;
  border-radius: 12px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.4;
}

.user {
  align-self: flex-end;
  background: #3b82f6;
  color: white;
}

.bot {
  align-self: flex-start;
  background: #1f2937;
  color: #e5e7eb;
}

/* input area */
.input-area {
  display: flex;
  padding: 10px;
  background: #0f172a;
  gap: 8px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">AI Chat UI</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.classList.add("message", type);
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function fakeAIResponse(userText) {
  return "AI: You said -> " + userText;
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    addMessage(fakeAIResponse(text), "bot");
  }, 600);
}
</script>

</body>
</html>
